[extend]
useDefault = true

# Single merged allowlist — uses the universally-supported `[allowlist]`
# (singular) form. The `[[allowlists]]` array-of-tables form is only honored
# reliably by gitleaks >= 8.19, but CI pins gitleaks-action@v2.3.9 which
# bundles gitleaks v8.18.4. With the singular form everything is merged
# into one allowlist block that both old and new gitleaks respect.
[allowlist]
description = "Merged allowlist — build artifacts, deterministic test fixtures, and error-code false positives"
paths = [
  # Generated Next.js build artifacts
  '''(^|/)app/\.next/.*''',
  # Zig test files (deterministic fixtures, not real credentials)
  '''(^|/).*_test\.zig$''',
  # Shared test-fixture helpers (deterministic seeds, not real credentials)
  '''(^|/)test_fixtures\.zig$''',
  # Centralized persona auth fixtures — deterministic offline test JWTs minted by
  # scripts/mint-scope-personas.mjs against a throwaway committed test key.
  '''(^|/)test_scope_tokens\.zig$''',
  # Zig build/cache directories
  '''(^|/)\.tmp/''',
  '''(^|/)zig-cache/''',
  '''(^|/)\.zig-cache/''',
  '''(^|/)zig-out/''',
  '''(^|/)\.tmp/zig-global-cache/''',
  # Vendored pg.zig upstream test suite (vendor/pg/tests/) — pg.zig's own TLS
  # fixtures (client.key/crt, root.crt). Not in our build graph: the pg module
  # roots at vendor/pg/src/pg.zig. Kept byte-identical to upstream rather than
  # deleted, so allowlist its real-but-unused test PEM.
  '''(^|/)vendor/pg/tests/.*''',
  # Vendored pg.zig SASL handshake — line 39 advertises the "SCRAM-SHA-256"
  # mechanism string (eqlIgnoreCase compare), not a credential. False positive.
  '''(^|/)vendor/pg/src/proto/authentication_request\.zig$''',
]
regexTarget = "match"
regexes = [
  # Pre-M104 test JWTs (kid=rbac-test-kid) still present in git HISTORY — gitleaks
  # `detect` scans every commit, not just the working tree. The live tree mints
  # kid=test-kid-static (allowlisted via test_scope_tokens.zig / *_test.zig paths),
  # but these old-path fixtures persist in history. Deterministic, not real creds.
  # Do NOT remove based on a working-tree-only grep — history still trips it.
  '''eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6InJiYWMtdGVzdC1raWQifQ\..*''',
  # UZ-* error codes in structured log messages (false positive: generic-api-key)
  '''UZ-[A-Z]+-\d{3}''',
  # Auth middleware test fixtures — deterministic signing secrets & nonces
  '''nonce1234567890abcdef''',
  '''8f742231b10e8888abcd99yyyzz0ek9i''',
]
stopwords = [
  "nonce1234567890abcdef",
  "8f742231b10e8888abcd99yyyzz0ek9i",
]

[[rules]]
id = "generic-api-key"

  [rules.allowlist]
  description = "Oracle Secure Hash Algorithm 256-bit (SHA-256) lock digests"
  condition = "AND"
  paths = ['''(^|/)\.oracle/ruleset\.lock$''']
  regexTarget = "secret"
  regexes = ['''^[0-9a-f]{64}$''']
