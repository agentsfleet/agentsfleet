# agentsfleet local dev — Postgres + Redis + agentsfleetd API
# `make up` prepares the matching local linux binary in `dist/` and passes
# `TARGETARCH` to docker compose. CI does not use this path.
services:
  postgres:
    container_name: agentsfleet-postgres
    image: mirror.gcr.io/library/postgres:18-alpine
    command:
      - sh
      - -c
      - |
        exec docker-entrypoint.sh postgres
    environment:
      POSTGRES_USER: agentsfleet
      POSTGRES_PASSWORD: agentsfleet
      POSTGRES_DB: agentsfleetdb
      # Postgres 18+ refuses to run when the data directory equals the mount
      # root. Pointing PGDATA at a subdirectory satisfies the new layout
      # requirement without restructuring the volume.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentsfleet -d agentsfleetdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    container_name: agentsfleet-redis
    image: mirror.gcr.io/library/redis:7-alpine
    command:
      - sh
      - -c
      - |
        apk add --no-cache openssl &&
        mkdir -p /tls &&
        if [ ! -s /tls/server.crt ] || [ ! -s /tls/server.key ]; then
          openssl req -x509 -newkey rsa:2048 -nodes -keyout /tls/server.key -out /tls/server.crt -days 3650 -subj "/CN=localhost" -addext "subjectAltName=DNS:localhost,DNS:redis,IP:127.0.0.1" 2>/dev/null
        fi &&
        redis-server --tls-port 6379 --port 0 --tls-cert-file /tls/server.crt --tls-key-file /tls/server.key --tls-ca-cert-file /tls/server.crt --tls-auth-clients no --requirepass agentsfleet
    ports:
      - "6379:6379"
    volumes:
      - redis-tls:/tls
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --tls --insecure -a agentsfleet --no-auth-warning ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qstash:
    container_name: agentsfleet-qstash
    # Upstash's official QStash local dev server, run via Bun. Ships deterministic
    # credentials (fixed token + signing keys), so integration tests point at it
    # with a committed fixture token — no per-run secret. Used by the opt-in live
    # QStash tests (AGENTSFLEET_QSTASH_LIVE_URL/TOKEN); self-skip when it is down.
    # Debian (glibc), not Alpine: the CLI fetches a glibc-linked Go binary that
    # cannot exec under musl.
    image: mirror.gcr.io/oven/bun:1
    command:
      - sh
      - -c
      - |
        cd /tmp
        bun add @upstash/qstash-cli@latest
        # Bun blocks postinstall scripts, so the Go binary the CLI wraps is not
        # fetched by `bun add` — run its installer explicitly before launching.
        bun node_modules/@upstash/qstash-cli/install.js
        exec node_modules/@upstash/qstash-cli/bin/qstash dev -port 8080
    ports:
      - "8080:8080"
    healthcheck:
      # Unauthenticated requests 401, which still proves the server is accepting
      # connections; fetch resolves on any HTTP response and rejects only on a
      # connection error, so a resolved fetch means healthy.
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      # Generous: the container installs the CLI and downloads its Go binary on
      # first boot, so a cold or slow network needs well past the usual budget —
      # a premature unhealthy verdict fails the whole integration lane.
      retries: 60
      start_period: 30s

  agentsfleetd:
    container_name: agentsfleetd-api
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    ports:
      - "3000:3000"
    env_file:
      # agentsfleetd's local override file (disambiguated from the app's .env.local and
      # the runner's .env.runner.local). Optional — the inline `environment:` block
      # below already satisfies a from-scratch `make up`.
      - path: .env.agentsfleetd.local
        required: false
    environment:
      # Local dev defaults: satisfy role-separated startup checks without
      # requiring a checked-in .env file.
      ENCRYPTION_MASTER_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef # gitleaks:allow
      GITHUB_APP_ID: "12345"
      GITHUB_APP_PRIVATE_KEY: local-dev-private-key
      # Override DB/Redis to use compose service names instead of localhost.
      DATABASE_URL_API: postgresql://agentsfleet:agentsfleet@postgres:5432/agentsfleetdb?application_name=api&sslmode=disable
      REDIS_URL_API: rediss://:agentsfleet@redis:6379/api
      REDIS_TLS_CA_CERT_FILE: /tls/server.crt
      MIGRATE_ON_START: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - redis-tls:/tls:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  redis-tls:
