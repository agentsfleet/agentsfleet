name: lint

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-zig:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
    env:
      ZLINT_VERSION: v0.9.0
    steps:
      - uses: actions/checkout@v6
      - name: Install ZLint
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/DonIsaac/zlint/releases/download/${ZLINT_VERSION}/zlint-linux-x86_64" -o "$RUNNER_TEMP/bin/zlint"
          chmod +x "$RUNNER_TEMP/bin/zlint"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Run Zig lint gate
        run: make lint-zig
      - name: Run pg-drain check
        run: python3 lint-zig.py src

  lint-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install website dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/website
      - name: Run website lint gate
        run: make lint-website

  lint-apps-ds-ctl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install app dependencies
        run: bun install --frozen-lockfile
        working-directory: ui/packages/app
      - name: Install agentsfleet dependencies
        run: bun install --frozen-lockfile
        working-directory: cli
      - name: Run app + design-system + agentsfleet lint gate
        run: make lint-apps-ds-ctl

  lint-agentsfleet-sh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Gates the merge: a broken installer can't reach main, so the git-connected
      # Cloudflare Pages project never auto-deploys a broken curl|bash target.
      - name: Shellcheck + smoke-test the installer
        run: |
          shellcheck -s bash ui/agentsfleet.dev/dist/install.sh ui/agentsfleet.dev/install_test.sh
          bash ui/agentsfleet.dev/install_test.sh

  check-gh-actions-valid:
    runs-on: ubuntu-latest
    env:
      ACTIONLINT_VERSION: 1.7.11
    steps:
      - uses: actions/checkout@v6
      - name: Install actionlint
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C "$RUNNER_TEMP/bin" actionlint
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Validate GH Actions workflows (actionlint + make-target refs)
        run: make check-gh-actions-valid

  check-openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install root dependencies (pulls @redocly/cli)
        run: bun install --frozen-lockfile
      - name: Assert public/openapi.json is produced purely from YAML
        run: |
          # Delete the committed JSON first, then let `make check-openapi`
          # rebundle it from the YAML source alone. If `git diff` then shows
          # any delta vs HEAD, either the YAML is out of sync or someone
          # hand-edited the JSON.
          rm public/openapi.json
          make check-openapi
          if ! git diff --exit-code public/openapi.json; then
            echo "::error::public/openapi.json drifted from public/openapi/**.yaml."
            echo "::error::Run 'make check-openapi' locally and commit the result."
            exit 1
          fi

  safety-gates:
    # Repo-hygiene gates that lived under `make lint-all` but were never run by
    # CI, so a broken architecture reference, an ungated vault reader, or a
    # deploy-safety regression could merge green. Each is a static check needing
    # only shellcheck (on the runner image) and flock (util-linux, present) — no
    # bun/zig build. GitHub sets CI=true, so check-deploy-safety's flock lock
    # tests run here rather than skip.
    #
    # The full check-route-registration-doc gate is absent: its subject,
    # docs/REST_API_DESIGN_GUIDELINES.md, is committed as an absolute-path symlink
    # into a developer's dotfiles, so it dangles in a fresh CI checkout. Validating
    # the actual guide (phantom targets, stale paths) stays in `make lint-all` +
    # the pre-commit hook, which run where the dotfiles resolve; a CI doc-freshness
    # gate would need the doc de-symlinked first (a dotfiles-owned change). BUT the
    # checker's *logic* — the make-target regexes this milestone widened — is
    # validated here by its self-test, which reads real make/ files and skips the
    # one guide-dependent case, so a regex regression is still caught in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Playbooks (shellcheck + refs + vault-gate parity)
        run: make check-playbooks
      - name: Architecture doc consistency
        run: make check-architecture-doc
      - name: Deploy version/lock safety
        run: make check-deploy-safety
      - name: Route-registration checker logic (self-test; guide case skips in CI)
        run: python3 scripts/check_route_registration_doc_test.py

  lint:
    runs-on: ubuntu-latest
    needs: [lint-zig, lint-website, lint-apps-ds-ctl, lint-agentsfleet-sh, check-gh-actions-valid, check-openapi, safety-gates]
    steps:
      - name: Preserve legacy lint check name
        run: echo "All lint lanes passed"
