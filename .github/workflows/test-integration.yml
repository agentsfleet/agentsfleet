name: test-integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # We manage the build cache ourselves via actions/cache on .tmp/ (see
          # below). setup-zig's own cache is keyed per run-id (never reused
          # across runs) AND it exports ZIG_GLOBAL/LOCAL_CACHE_DIR, which would
          # hijack the Makefile's .tmp/ paths and leave our cache empty.
          use-cache: false
      - name: Install OpenSSL dev headers
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libssl-dev

      # Persist the Zig compilation cache across runs. The Makefile points Zig's
      # cache at .tmp/zig-{global,local}-cache (forced on the build step below,
      # so setup-zig can't redirect it) — without this, every CI run recompiles
      # the agentsfleetd test binary from cold (~150s). Content-addressed: a
      # stale hit only triggers a recompile of changed modules, never a wrong build.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Start Postgres and Redis via docker compose
        run: docker compose up -d postgres redis

      - name: Wait for Postgres to be ready
        run: |
          echo "→ Waiting for Postgres (TLS-enabled container, may need extra startup time)..."
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U agentsfleet -d agentsfleetdb 2>/dev/null && break
            echo "  attempt $i/30 — not ready yet"
            sleep 3
          done
          pg_isready -h localhost -p 5432 -U agentsfleet -d agentsfleetdb \
            || { echo "✗ Postgres did not become ready in time"; exit 1; }
          echo "✓ Postgres is ready"

      - name: Wait for Redis to be ready
        run: |
          echo "→ Waiting for Redis..."
          for i in $(seq 1 30); do
            docker compose exec -T redis redis-cli --tls --insecure -a agentsfleet ping 2>/dev/null | grep -q PONG && break
            echo "  attempt $i/30 — not ready yet"
            sleep 2
          done
          docker compose exec -T redis redis-cli --tls --insecure -a agentsfleet ping 2>/dev/null | grep -q PONG \
            || { echo "✗ Redis did not become ready in time"; exit 1; }
          echo "✓ Redis is ready"

      - name: Extract Redis TLS CA cert
        run: |
          mkdir -p .tmp
          docker compose cp redis:/tls/server.crt .tmp/redis-ca.crt
          echo "TEST_REDIS_TLS_CA_CERT=$(pwd)/.tmp/redis-ca.crt" >> "$GITHUB_ENV"

      - name: Run all integration tests
        env:
          TEST_DATABASE_URL: postgres://agentsfleet:agentsfleet@localhost:5432/agentsfleetdb
          TEST_REDIS_TLS_URL: rediss://:agentsfleet@localhost:6379
          # Force the build to write where actions/cache reads (step env beats
          # setup-zig's GITHUB_ENV export). These equal the Makefile's CURDIR
          # default, so the cached objects are found + saved.
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: make test-integration

      - name: Stop services
        if: always()
        run: docker compose down

  # Runner real-process sandbox proofs — its own build_runner.zig graph, no
  # datastore and no docker infra (forks real children, reads /proc, kills by
  # pgroup). Kept a separate job so the env-filter / kill-tree / cgroup-fault
  # proofs actually execute on a Linux host rather than only compiling. Mirrors
  # the test-unit-agentsfleet-runner job: same CI container, same Zig 0.16.0 toolchain.
  test-integration-kernel:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
      # Privileged + private cgroup namespace so the security-enforcement proofs
      # can delegate a cgroup-v2 controller subtree (cgroup pids/OOM cage). The
      # GitHub runner is native amd64, so seccomp's arch-matched BPF filter is
      # faithful (no QEMU). seccomp/Landlock need no privilege; the cgroup cage does.
      options: --privileged --cgroupns=private
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Persist the Zig cache (build_runner.zig graph) across runs — see note
      # in the test-integration job above. Content-addressed, so a stale hit
      # only recompiles changed modules.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-
      - name: Runner kernel integration proofs (env filter + kill-tree + seccomp/Landlock/cgroup)
        run: sh scripts/cgroup-delegate.sh && make test-integration-kernel
