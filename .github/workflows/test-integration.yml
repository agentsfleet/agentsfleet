name: test-integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
      # Run in the project's own CI image — the same one every Zig unit job and
      # test-integration-kernel already use. Zig 0.16.0 + libssl-dev are baked
      # in, so this lane stops paying the per-run setup-zig download + apt
      # install. --network host keeps localhost:5432/6379 pointing at the
      # compose-published ports (test connection strings unchanged); the mounted
      # docker socket lets the image's docker-cli + compose v2 drive the
      # Postgres/Redis containers against the host daemon.
      options: --network host -v /var/run/docker.sock:/var/run/docker.sock
      # Brushed the old 10-min ceiling (one run was cancelled at 600s); the
      # suite run is the long pole, so give it headroom while the container +
      # overlap below trim the front-loaded setup/compile.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Persist the Zig compilation cache across runs. The Makefile points Zig's
      # cache at .tmp/zig-{global,local}-cache — without this, every CI run
      # recompiles the agentsfleetd test binary from cold (~150s). Content-
      # addressed: a stale hit only recompiles changed modules, never a wrong
      # build. Same key as the host-runner job had (runner.os/github.job
      # unchanged), so existing cache entries carry over to the container.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Boot datastores and pre-compile the test binary in parallel
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: |
          # Start Postgres + Redis booting now (no --wait, returns immediately).
          # `make test-integration` below blocks on their healthchecks via its
          # own `docker compose up --wait`, so this boot — including Redis's
          # apk-add + cert-gen — overlaps the compile instead of running before
          # it. The Makefile also extracts the Redis TLS CA cert into
          # .tmp/redis-ca.crt (its TEST_REDIS_TLS_CA_CERT default), so no manual
          # wait/extract steps are needed here.
          docker compose up -d postgres redis
          # Compile — but do not run — the integration test binary while the
          # datastores finish coming up. `test-bin` installs the exact artifact
          # `zig build test` executes (build.zig), so the run step finds a warm
          # cache and only *runs* the suite. On a cold/partial cache this is
          # where the long agentsfleetd compile happens, now hidden behind boot.
          mkdir -p "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR"
          zig build test-bin

      - name: Run all integration tests
        env:
          TEST_DATABASE_URL: postgres://agentsfleet:agentsfleet@localhost:5432/agentsfleetdb
          TEST_REDIS_TLS_URL: rediss://:agentsfleet@localhost:6379
          # Equal the Makefile's CURDIR default so the objects compiled by the
          # pre-compile step above are found here (warm cache → run-only).
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: make test-integration

      - name: Stop services
        if: always()
        run: docker compose down

  # Runner real-process sandbox proofs — its own build_runner.zig graph, no
  # datastore and no docker infra (forks real children, reads /proc, kills by
  # pgroup). Kept a separate job so the env-filter / kill-tree / cgroup-fault
  # proofs actually execute on a Linux host rather than only compiling. Mirrors
  # the test-unit-agentsfleet-runner job: same CI container, same Zig 0.16.0 toolchain.
  test-integration-kernel:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
      # Privileged + private cgroup namespace so the security-enforcement proofs
      # can delegate a cgroup-v2 controller subtree (cgroup pids/OOM cage). The
      # GitHub runner is native amd64, so seccomp's arch-matched BPF filter is
      # faithful (no QEMU). seccomp/Landlock need no privilege; the cgroup cage does.
      options: --privileged --cgroupns=private
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Persist the Zig cache (build_runner.zig graph) across runs — see note
      # in the test-integration job above. Content-addressed, so a stale hit
      # only recompiles changed modules.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-
      - name: Runner kernel integration proofs (env filter + kill-tree + seccomp/Landlock/cgroup)
        run: sh scripts/cgroup-delegate.sh && make test-integration-kernel
