name: test-integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run inside our pre-baked Zig image (like the unit/memleak/lint lanes)
    # instead of bare ubuntu-latest + setup-zig. The image bundles the Docker
    # CLI + compose v2 + postgresql-client; mounting the host Docker socket lets
    # `docker compose` drive Postgres/Redis on the host daemon. With no
    # setup-zig, the Makefile's .tmp/ Zig-cache default applies, so actions/cache
    # works exactly like the other container jobs (no env override needed).
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
      options: --volume /var/run/docker.sock:/var/run/docker.sock
    env:
      # Fixed compose project so we can join its default network by name and
      # reach the services as postgres:5432 / redis:6379 (the Redis TLS cert's
      # SAN includes `redis`, so TLS verifies on that hostname).
      COMPOSE_PROJECT_NAME: af
    steps:
      - uses: actions/checkout@v6

      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Start Postgres and Redis via docker compose
        run: docker compose up -d postgres redis

      - name: Join the compose network (reach services by name from this container)
        run: docker network connect "${COMPOSE_PROJECT_NAME}_default" "$(hostname)"

      - name: Wait for Postgres to be ready
        run: |
          echo "→ Waiting for Postgres (TLS-enabled container, may need extra startup time)..."
          for i in $(seq 1 30); do
            pg_isready -h postgres -p 5432 -U agentsfleet -d agentsfleetdb 2>/dev/null && break
            echo "  attempt $i/30 — not ready yet"
            sleep 3
          done
          pg_isready -h postgres -p 5432 -U agentsfleet -d agentsfleetdb \
            || { echo "✗ Postgres did not become ready in time"; exit 1; }
          echo "✓ Postgres is ready"

      - name: Wait for Redis to be ready
        run: |
          echo "→ Waiting for Redis..."
          for i in $(seq 1 30); do
            docker compose exec -T redis redis-cli --tls --insecure -a agentsfleet ping 2>/dev/null | grep -q PONG && break
            echo "  attempt $i/30 — not ready yet"
            sleep 2
          done
          docker compose exec -T redis redis-cli --tls --insecure -a agentsfleet ping 2>/dev/null | grep -q PONG \
            || { echo "✗ Redis did not become ready in time"; exit 1; }
          echo "✓ Redis is ready"

      - name: Extract Redis TLS CA cert
        run: |
          mkdir -p .tmp
          docker compose cp redis:/tls/server.crt .tmp/redis-ca.crt
          echo "TEST_REDIS_TLS_CA_CERT=$(pwd)/.tmp/redis-ca.crt" >> "$GITHUB_ENV"

      - name: Run all integration tests
        env:
          # Service-name hosts on the joined compose network (not localhost —
          # localhost is this container). sslmode=disable: the PG container has
          # no TLS; the Makefile only auto-appends it for localhost/127.0.0.1.
          TEST_DATABASE_URL: postgres://agentsfleet:agentsfleet@postgres:5432/agentsfleetdb?sslmode=disable
          TEST_REDIS_TLS_URL: rediss://:agentsfleet@redis:6379
        run: make test-integration

      - name: Stop services
        if: always()
        run: docker compose down

  # Runner real-process sandbox proofs — its own build_runner.zig graph, no
  # datastore and no docker infra (forks real children, reads /proc, kills by
  # pgroup). Kept a separate job so the env-filter / kill-tree / cgroup-fault
  # proofs actually execute on a Linux host rather than only compiling. Mirrors
  # the test-unit-agentsfleet-runner job: same CI container, same Zig 0.16.0 toolchain.
  test-integration-agentsfleet-runner:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Persist the Zig cache (build_runner.zig graph) across runs — see note
      # in the test-integration job above. Content-addressed, so a stale hit
      # only recompiles changed modules.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-
      - name: Runner sandbox proofs (env filter + kill-tree + cgroup-fault)
        run: make test-integration-agentsfleet-runner
