name: test-integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-integration:
    runs-on: ubuntu-latest
    # Brushed the old 10-min ceiling (one run was cancelled at 600s); the suite
    # run is the long pole, so give it headroom while the image + overlap below
    # trim the front-loaded setup/compile.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      # Persist the Zig compilation cache across runs. The Makefile points Zig's
      # cache at .tmp/zig-{global,local}-cache — without this, every CI run
      # recompiles the agentsfleetd test binary from cold (~150s). Content-
      # addressed: a stale hit only recompiles changed modules, never a wrong
      # build. Key unchanged (runner.os/github.job identical), so existing
      # cache entries carry over.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Run integration tests in ci-zig-ubuntu (compose datastores on host)
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: |
          # Boot Postgres + Redis on the host daemon now (no --wait, returns
          # immediately). The make target's own `docker compose up --wait` (run
          # inside the image below) blocks on the healthchecks, so this boot —
          # including Redis's apk-add + cert-gen — overlaps the compile instead
          # of running serially before it. _ensure-test-infra also extracts the
          # Redis TLS CA cert into .tmp/redis-ca.crt (its TEST_REDIS_TLS_CA_CERT
          # default), so no manual wait/extract steps are needed.
          docker compose up -d postgres redis
          # Build + test inside the project's own CI image (Zig 0.16.0 +
          # libssl-dev + docker compose v2 baked in) — the same image every Zig
          # unit job and test-integration-kernel use, so this lane stops paying
          # the per-run setup-zig download + apt install. We run it via `docker
          # run` rather than a job `container:` because --network host is
          # mandatory here (keeps localhost:5432/6379 pointing at the compose-
          # published ports, so the connection strings are unchanged) and a GHA
          # job container is forced onto GitHub's managed network, which rejects
          # --network host. The mounted socket lets the in-image compose drive
          # the host daemon; the workspace is bind-mounted at the same path so
          # the restored Zig cache + extracted cert line up inside and out.
          #
          # `test-bin` first compiles (without running) the exact artifact
          # `zig build test` executes (build.zig), so the suite then finds a
          # warm cache and only *runs* — on a cold cache the long compile lands
          # here, hidden behind the datastore boot above.
          docker run --rm --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}":"${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e ZIG_GLOBAL_CACHE_DIR \
            -e ZIG_LOCAL_CACHE_DIR \
            -e TEST_DATABASE_URL="postgres://agentsfleet:agentsfleet@localhost:5432/agentsfleetdb" \
            -e TEST_REDIS_TLS_URL="rediss://:agentsfleet@localhost:6379" \
            ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0 \
            sh -c 'mkdir -p "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR" && zig build test-bin && make test-integration'

      - name: Stop services
        if: always()
        run: docker compose down

  # Runner real-process sandbox proofs — its own build_runner.zig graph, no
  # datastore and no docker infra (forks real children, reads /proc, kills by
  # pgroup). Kept a separate job so the env-filter / kill-tree / cgroup-fault
  # proofs actually execute on a Linux host rather than only compiling. Mirrors
  # the test-unit-agentsfleet-runner job: same CI container, same Zig 0.16.0 toolchain.
  test-integration-kernel:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/agentsfleet/ci-zig-ubuntu:0.16.0
      # Privileged + private cgroup namespace so the security-enforcement proofs
      # can delegate a cgroup-v2 controller subtree (cgroup pids/OOM cage). The
      # GitHub runner is native amd64, so seccomp's arch-matched BPF filter is
      # faithful (no QEMU). seccomp/Landlock need no privilege; the cgroup cage does.
      options: --privileged --cgroupns=private
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      # Persist the Zig cache (build_runner.zig graph) across runs — see note
      # in the test-integration job above. Content-addressed, so a stale hit
      # only recompiles changed modules.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-
      - name: Runner kernel integration proofs (env filter + kill-tree + seccomp/Landlock/cgroup)
        run: sh scripts/cgroup-delegate.sh && make test-integration-kernel
