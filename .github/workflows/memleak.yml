name: memleak

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  memleak:
    runs-on: ubuntu-latest
    # Valgrind's 10-30x slowdown across three test graphs plus the boot→drain
    # lifecycle lane; ~15 min on a warm Zig cache, headroom for a cold one.
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6
      # Persist the Zig cache across runs so memleak doesn't recompile the test
      # binary from cold every time (~150s). Content-addressed: a stale hit only
      # recompiles changed modules, never a wrong build.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-${{ runner.os }}-${{ github.job }}-0.16.0-
      # Mirrors the test-integration job's shape: docker work on the HOST, the
      # Zig/valgrind work inside the project's pre-baked image via `docker run`
      # (not a job `container:` — the gate's boot→drain lane needs live
      # postgres/redis, the trixie image carries valgrind but no docker CLI, and
      # --network host keeps localhost:5432/6379 pointing at the compose-
      # published ports; a GHA job container is forced onto GitHub's managed
      # network, which rejects --network host).
      #
      # The host provisions infra with the SAME make recipe the gate runs
      # locally — no forked logic — then the container runs the gate with
      # TEST_INFRA=provided, whose short-circuit re-verifies the extracted CA
      # cert and fails closed if infra was claimed but not provided.
      - name: Run memleak gate in ci-zig-debian-trixie (compose datastores on host)
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: |
          make _ensure-test-infra
          # Pre-baked: trixie-slim + Zig + valgrind + libc6-dev (the boot→drain
          # lane's daemon compile links OpenSSL, whose headers need the base
          # libc set). Trixie's valgrind groks Zig DWARF; bookworm's misreads
          # frames. seccomp=unconfined because valgrind's syscall interception
          # trips the default profile.
          docker run --rm --network host \
            -v "${{ github.workspace }}":"${{ github.workspace }}" \
            -w "${{ github.workspace }}" \
            -e ZIG_GLOBAL_CACHE_DIR \
            -e ZIG_LOCAL_CACHE_DIR \
            -e TEST_INFRA=provided \
            --security-opt seccomp=unconfined \
            ghcr.io/agentsfleet/ci-zig-debian-trixie:0.16.0 \
            sh -c 'mkdir -p "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR" && make memleak'
      - name: Stop services
        if: always()
        run: docker compose down
