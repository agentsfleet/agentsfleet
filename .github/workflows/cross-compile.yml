name: cross-compile

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/cross-compile.yml'
  workflow_call:
    # Called by release.yml to run verify-runtime-compat against release binaries.
    # Callers are responsible for building and uploading the artifact named
    # "agentsfleetd-linux-amd64-ci" before invoking this workflow.
    inputs:
      skip_build:
        description: "Set to 'true' to skip build jobs and only run verify-runtime-compat"
        type: string
        default: "false"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # x86_64: build inside Alpine container — musl-native OpenSSL, fully static output.
  # JS actions work inside Alpine on x86_64 runners.
  cross-compile-linux-x86:
    if: inputs.skip_build != 'true'
    runs-on: ubuntu-latest
    container:
      # Pre-baked: alpine:3.21 + Zig + apk deps + x86_64-linux-gnu OpenSSL
      # static-link symlinks already in place. Multi-arch image; the linux/amd64
      # variant is auto-selected on the x86_64 runner.
      image: ghcr.io/agentsfleet/ci-zig-alpine:0.16.0
    steps:
      - uses: actions/checkout@v6

      # Persist the Zig cache across runs — without this every cross-compile is a
      # full cold ReleaseSafe (LLVM) build. Content-addressed; a stale hit only
      # recompiles changed modules. Distinct key prefix (zig-xcompile) from the
      # Debug-native test lanes so the two caches never collide. GNU tar is
      # present in ci-zig-alpine, so actions/cache works inside the container.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Compile agentsfleetd + agentsfleet-runner (x86_64-linux)
        # Retry on transient GitHub CDN 5xx when fetching transitive zig deps.
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: |
          mkdir -p "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR"
          attempt=1
          until zig build -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl \
             && zig build --build-file build_runner.zig -Doptimize=ReleaseSafe -Dtarget=x86_64-linux-musl; do
            if [ "$attempt" -ge 3 ]; then
              echo "FAIL: zig build failed after 3 attempts"
              exit 1
            fi
            echo "  zig build attempt $attempt failed; retrying in $((attempt * 10))s..."
            sleep $((attempt * 10))
            attempt=$((attempt + 1))
          done

      - name: Verify static ELF — zero NEEDED, no INTERP (x86_64-linux)
        run: |
          for bin in zig-out/bin/agentsfleetd zig-out/bin/agentsfleet-runner; do
            test -f "$bin"
            if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
              echo "FAIL: $bin has dynamic NEEDED entries"
              readelf -d "$bin" | grep NEEDED
              exit 1
            fi
            if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
              echo "FAIL: $bin has INTERP (dynamic linker) section"
              exit 1
            fi
            echo "✓ $bin: fully static (zero NEEDED, no INTERP)"
          done

      - name: Upload x86_64 binary for runtime compat check
        uses: actions/upload-artifact@v7
        with:
          name: agentsfleetd-linux-amd64-ci
          path: zig-out/bin/agentsfleetd
          retention-days: 1

  # aarch64: JS actions cannot run inside Alpine on ARM64 runners.
  # Solution: use the bare ubuntu-24.04-arm runner (JS actions work fine),
  # then invoke `docker run alpine:3.21` for the Zig build step to get
  # musl-native static OpenSSL — the same pattern as `make build-linux-alpine`.
  cross-compile-linux-aarch64:
    if: inputs.skip_build != 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      # Persist the Zig cache across runs (see the x86 job). Kept under
      # runner.temp — OUTSIDE the workspace that `cp -a /src/. /build` copies —
      # so a warm cache isn't re-copied into the build dir each run. The host
      # ubuntu-arm runner has GNU tar, so actions/cache works here even though
      # the build itself runs inside the mounted Alpine container.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/zig-xcache-aarch64
          key: zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Build aarch64-linux inside Alpine (musl-native static OpenSSL)
        # Pre-baked image: ci-zig-alpine multi-arch manifest carries linux/arm64,
        # so docker pulls the arm64 variant (no QEMU emulation needed on the
        # native ubuntu-24.04-arm runner). Image already has openssl-libs-static,
        # the aarch64-linux-gnu symlinks, and Zig 0.16.0 in /opt/zig on $PATH.
        run: |
          mkdir -p "$GITHUB_WORKSPACE/zig-out/bin"
          mkdir -p "$RUNNER_TEMP/zig-xcache-aarch64/global" "$RUNNER_TEMP/zig-xcache-aarch64/local"
          docker run --rm \
            --platform linux/arm64 \
            -v "$GITHUB_WORKSPACE:/src:ro" \
            -v "$GITHUB_WORKSPACE/zig-out:/zig-out" \
            -v "$RUNNER_TEMP/zig-xcache-aarch64:/zig-cache" \
            -e ZIG_GLOBAL_CACHE_DIR=/zig-cache/global \
            -e ZIG_LOCAL_CACHE_DIR=/zig-cache/local \
            ghcr.io/agentsfleet/ci-zig-alpine:0.16.0 \
            sh -c '
              set -e
              cp -a /src/. /build
              cd /build
              echo "  compiling agentsfleetd + agentsfleet-runner (aarch64-linux)..."
              # Retry zig build up to 3x — fork-pinned deps (httpz/pg/
              # zig_yaml) and their transitive packages are fetched from
              # github.com, and github'\''s archive CDN occasionally returns 5xx.
              # Retries handle the transient-network failure mode without
              # vendoring every package.
              attempt=1
              until zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl \
                 && zig build --build-file build_runner.zig -Doptimize=ReleaseSafe -Dtarget=aarch64-linux-musl; do
                if [ "$attempt" -ge 3 ]; then
                  echo "FAIL: zig build failed after 3 attempts"
                  exit 1
                fi
                echo "  zig build attempt $attempt failed; retrying in $((attempt * 10))s..."
                sleep $((attempt * 10))
                attempt=$((attempt + 1))
              done
              for bin in zig-out/bin/agentsfleetd zig-out/bin/agentsfleet-runner; do
                test -f "$bin"
                if readelf -d "$bin" 2>/dev/null | grep -q " (NEEDED)"; then
                  echo "FAIL: $bin has dynamic NEEDED entries"
                  readelf -d "$bin" | grep NEEDED
                  exit 1
                fi
                if readelf -l "$bin" 2>/dev/null | grep -q "INTERP"; then
                  echo "FAIL: $bin has INTERP (dynamic linker) section"
                  exit 1
                fi
                echo "  ✓ $bin: fully static (zero NEEDED, no INTERP)"
              done
              cp zig-out/bin/agentsfleetd       /zig-out/bin/agentsfleetd
              cp zig-out/bin/agentsfleet-runner /zig-out/bin/agentsfleet-runner
            '

      - name: Verify output artifacts (aarch64-linux)
        run: |
          test -f zig-out/bin/agentsfleetd
          test -f zig-out/bin/agentsfleet-runner
          echo "✓ aarch64-linux artifacts present"

  # Verify the static x86_64 binary runs on all target Linux environments
  # (bookworm = Fly.io, alpine = musl-native, trixie = bare-metal worker).
  # ldd "not a dynamic executable" proves no dynamic linker dependency.
  verify-runtime-compat:
    runs-on: ubuntu-latest
    needs: cross-compile-linux-x86
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: agentsfleetd-linux-amd64-ci
          path: dist

      - name: Make binary executable
        run: chmod +x dist/agentsfleetd

      - name: Verify in debian:bookworm-slim (Fly.io target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            mirror.gcr.io/library/debian:bookworm-slim \
            sh -c 'ldd /test/agentsfleetd 2>&1 | grep -q "not a dynamic executable" && echo "✓ bookworm-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in bookworm-slim"; ldd /test/agentsfleetd 2>&1; exit 1)'

      - name: Verify in alpine:3.21 (musl-native)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            mirror.gcr.io/library/alpine:3.21 \
            sh -c 'ldd /test/agentsfleetd 2>&1 | grep -qiE "not a dynamic|Not a valid dynamic" && echo "✓ alpine: static binary confirmed" || (echo "FAIL: dynamic deps found in alpine"; ldd /test/agentsfleetd 2>&1; exit 1)'

      - name: Verify in debian:trixie-slim (bare-metal worker target)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/dist:/test:ro" \
            mirror.gcr.io/library/debian:trixie-slim \
            sh -c 'ldd /test/agentsfleetd 2>&1 | grep -q "not a dynamic executable" && echo "✓ trixie-slim: static binary confirmed" || (echo "FAIL: dynamic deps found in trixie-slim"; ldd /test/agentsfleetd 2>&1; exit 1)'

  cross-compile-macos:
    if: inputs.skip_build != 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
          # We manage the build cache via actions/cache on .tmp/ below; setup-zig
          # otherwise exports ZIG_GLOBAL/LOCAL_CACHE_DIR and hijacks those paths.
          use-cache: false

      # Persist the Zig cache across runs — without this every macOS cross is a
      # full cold ReleaseSafe build. Same scheme as the Linux cross jobs.
      - name: Cache Zig build
        uses: actions/cache@v5
        with:
          path: |
            .tmp/zig-global-cache
            .tmp/zig-local-cache
          key: zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-${{ hashFiles('src/**/*.zig', 'schema/**/*.sql') }}
          restore-keys: |
            zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-${{ hashFiles('build.zig.zon', 'build.zig', 'build_runner.zig') }}-
            zig-xcompile-${{ runner.os }}-${{ github.job }}-0.16.0-

      - name: Ensure OpenSSL is available (macOS)
        run: brew install openssl@3 || true

      - name: Compile agentsfleetd + agentsfleet-runner (aarch64-macos)
        env:
          ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}/.tmp/zig-local-cache
        run: |
          mkdir -p "$ZIG_GLOBAL_CACHE_DIR" "$ZIG_LOCAL_CACHE_DIR"
          zig build -Doptimize=ReleaseSafe -Dtarget=aarch64-macos
          zig build --build-file build_runner.zig -Doptimize=ReleaseSafe -Dtarget=aarch64-macos

      - name: Verify binaries (aarch64-macos)
        run: |
          test -f zig-out/bin/agentsfleetd
          test -f zig-out/bin/agentsfleet-runner
