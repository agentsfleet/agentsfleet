components:
  schemas:
    CredentialSummary:
      type: object
      required:
      - name
      - created_at
      properties:
        name:
          type: string
        created_at:
          type: integer
          format: int64
    ErrorBody:
      type: object
      description: RFC 7807 problem detail error response (application/problem+json)
      required:
      - docs_uri
      - title
      - detail
      - error_code
      - request_id
      properties:
        docs_uri:
          type: string
          format: uri
          description: Stable link to documentation for this error code
          example: https://docs.agentsfleet.net/api-reference/error-codes#UZ-AGT-009
        title:
          type: string
          description: Short human-readable label, same for every occurrence of this code
          example: Fleet not found
        detail:
          type: string
          description: Instance-specific context describing what went wrong
          example: No fleet with id 'abc123' in this workspace.
        error_code:
          type: string
          description: Machine-readable error code
          example: UZ-AGT-009
        request_id:
          type: string
          description: Correlation ID for this request
        current_state:
          type: string
          description: Present only on 409 conflict responses (RFC 7807 extension). Names the resource state that
            forbade the requested transition, e.g. `paused` when steering a paused fleet (UZ-AGT-012).
          example: paused
    TenantApiKey:
      type: object
      description: Metadata for a tenant API key. `key_hash` and the raw key are never returned.
      required:
      - id
      - key_name
      - active
      - created_at
      properties:
        id:
          type: string
          format: uuid
        key_name:
          type: string
        active:
          type: boolean
        created_at:
          type: integer
          format: int64
        last_used_at:
          type: integer
          format: int64
          nullable: true
          description: Stays null until the async-stamping workstream ships.
        revoked_at:
          type: integer
          format: int64
          nullable: true
    FleetKey:
      type: object
      required:
      - fleet_key_id
      - fleet_id
      - name
      - created_at
      properties:
        fleet_key_id:
          type: string
          format: uuid
        fleet_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_at:
          type: integer
          format: int64
        last_used_at:
          type: integer
          format: int64
          nullable: true
    IntegrationGrant:
      type: object
      required:
      - grant_id
      - service
      - status
      - requested_at
      properties:
        grant_id:
          type: string
          format: uuid
        service:
          type: string
          enum:
          - slack
          - gmail
          - agentmail
          - discord
          - grafana
        status:
          type: string
          enum:
          - pending
          - approved
          - revoked
        requested_at:
          type: integer
          format: int64
        approved_at:
          type: integer
          format: int64
          nullable: true
        revoked_at:
          type: integer
          format: int64
          nullable: true
        reason:
          type: string
    MemoryEntry:
      type: object
      required:
      - key
      - content
      - category
      - updated_at
      properties:
        key:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 16384
        category:
          type: string
          description: e.g. core, episodic, task
        updated_at:
          type: integer
          format: int64
    PlatformKey:
      type: object
      description: A platform-wide LLM provider key configuration
      properties:
        provider:
          type: string
          description: LLM provider name
        source_workspace_id:
          type: string
          format: uuid
          description: Workspace whose self-managed key is used
        active:
          type: boolean
          description: Whether this platform key is active
        updated_at:
          type: integer
          format: int64
          description: Epoch milliseconds of the last update.
    ReadyzBody:
      type: object
      description: Response body for GET /readyz. Identical shape for both 200 (healthy) and 503 (degraded) responses — only
        the boolean values differ.
      required:
      - ready
      - database
      - queue
      properties:
        ready:
          type: boolean
          description: Overall readiness — true only when every dependency is healthy. Mirrors the HTTP status (true ↔ 200,
            false ↔ 503).
        database:
          type: boolean
          description: True if the PostgreSQL connection pool is reachable and a trivial query succeeds
        queue:
          type: boolean
          description: True if the Redis queue backend is reachable
      additionalProperties: false
    FleetSummary:
      type: object
      required:
      - id
      - name
      - status
      - created_at
      - updated_at
      - events_processed
      - budget_used_nanos
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum:
          - active
          - paused
          - stopped
          - killed
        created_at:
          type: integer
          format: int64
          description: Unix epoch milliseconds
        updated_at:
          type: integer
          format: int64
        triggers:
          type: array
          nullable: true
          description: Projected from config_json `x-agentsfleet.triggers`; null when the row has no triggers entry.
          items:
            $ref: '#/components/schemas/FleetTrigger'
        events_processed:
          type: integer
          format: int64
          description: Lifetime count of events this fleet has processed (rows in `core.fleet_events`).
        budget_used_nanos:
          type: integer
          format: int64
          description: Cumulative credit this fleet has consumed, in nanos (1 nano = 1/1,000,000,000 USD). Sum of its `fleet_execution_telemetry.credit_deducted_nanos`.
    FleetBundleTemplate:
      type: object
      required:
      - id
      - name
      - description
      - required_credentials
      - required_tools
      - network_hosts
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        required_credentials:
          type: array
          items:
            type: string
        required_tools:
          type: array
          items:
            type: string
        network_hosts:
          type: array
          items:
            type: string
    FleetBundleSupportFileSummary:
      type: object
      required:
      - path
      - size_bytes
      properties:
        path:
          type: string
        size_bytes:
          type: integer
          format: int64
    FleetBundleRequirements:
      type: object
      required:
      - credentials
      - tools
      - network_hosts
      - support_files
      - trigger_present
      properties:
        credentials:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        network_hosts:
          type: array
          items:
            type: string
        support_files:
          type: array
          items:
            type: string
        trigger_present:
          type: boolean
    FleetBundleDetail:
      type: object
      required:
      - bundle_id
      - name
      - source_kind
      - source_ref
      - validation_status
      - content_hash
      - snapshot_key
      - requirements
      - support_files
      properties:
        bundle_id:
          type: string
          format: uuid
        name:
          type: string
        source_kind:
          type: string
          enum:
          - template
          - upload
          - github
        source_ref:
          type: string
        validation_status:
          type: string
        content_hash:
          type: string
          description: SHA-256 content hash of the imported snapshot.
        snapshot_key:
          type: string
          description: Content-addressed snapshot key for runner materialization.
        requirements:
          $ref: '#/components/schemas/FleetBundleRequirements'
        support_files:
          type: array
          items:
            $ref: '#/components/schemas/FleetBundleSupportFileSummary'
    FleetTrigger:
      type: object
      description: A single trigger projected into the fleet list row.
      oneOf:
      - type: object
        required:
        - type
        - source
        properties:
          type:
            type: string
            enum:
            - webhook
          source:
            type: string
          events:
            type: array
            items:
              type: string
      - type: object
        required:
        - type
        - schedule
        properties:
          type:
            type: string
            enum:
            - cron
          schedule:
            type: string
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - api
    RunnerRegisterRequest:
      type: object
      description: Self-reported runner identity at enrollment. `sandbox_tier` is telemetry only — placement keys off operator-assigned trust, not this claim.
      required:
      - host_id
      - sandbox_tier
      - labels
      properties:
        host_id:
          type: string
          minLength: 1
          maxLength: 256
          description: Operator-supplied host identifier for this runner (1-256 chars).
        sandbox_tier:
          type: string
          description: Isolation strength the runner self-reports. Stored as telemetry.
          enum:
          - landlock_full
          - container_nested
          - macos_seatbelt
          - dev_none
        labels:
          type: array
          description: Free-form operator labels for placement/grouping.
          items:
            type: string
    RunnerRegisterResponse:
      type: object
      description: The durable runner identity plus its bearer token. The `runner_token` is returned exactly once; the server stores only its SHA-256 hash.
      required:
      - runner_id
      - runner_token
      properties:
        runner_id:
          type: string
          format: uuid
          description: The minted runner's id (UUIDv7).
        runner_token:
          type: string
          description: The `agt_r`-prefixed bearer token the runner presents on every later call. Returned once; never retrievable again.
    RunnerSummary:
      type: object
      description: One fleet row as returned to the operator. `liveness` is derived at read time (never stored); the auth `token_hash` and stored auth state are never returned.
      required:
      - id
      - host_id
      - sandbox_tier
      - admin_state
      - liveness
      - labels
      - last_seen_at
      - created_at
      properties:
        id:
          type: string
          format: uuid
        host_id:
          type: string
        sandbox_tier:
          type: string
          enum:
          - landlock_full
          - container_nested
          - macos_seatbelt
          - dev_none
        admin_state:
          type: string
          description: Operator intent. `active` admits the runner plane; the others reject it.
          enum:
          - active
          - cordoned
          - draining
          - drained
          - revoked
        liveness:
          type: string
          description: Derived runtime liveness. `registered` = minted, never seen; `busy` = holds a live lease; `online` = heartbeat fresh; `offline` = heartbeat stale.
          enum:
          - registered
          - busy
          - online
          - offline
        labels:
          type: array
          items:
            type: string
        last_seen_at:
          type: integer
          format: int64
          description: Epoch milliseconds of the last heartbeat; 0 if never seen.
        created_at:
          type: integer
          format: int64
          description: Epoch milliseconds the runner was registered.
    RunnerEvent:
      type: object
      description: One append-only runner history row.
      required:
      - id
      - runner_id
      - event_type
      - occurred_at
      - metadata
      properties:
        id:
          type: string
          format: uuid
        runner_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
          - runner_registered
          - runner_online
          - runner_offline
          - lease_acquired
          - lease_released
          - runner_cordoned
          - runner_draining
          - runner_drained
          - runner_revoked
        occurred_at:
          type: integer
          format: int64
          description: Epoch milliseconds the event occurred.
        metadata:
          type: object
          description: Event-type-specific metadata (e.g. host_id, from/to admin_state). Shape varies by event_type.
          additionalProperties: true
