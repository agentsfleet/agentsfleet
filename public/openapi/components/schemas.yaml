components:
  schemas:
    SecretSummary:
      type: object
      description: |
        A workspace secret's non-secret descriptors — the `api_key`/`data`
        payload is never projected here.
      required:
      - name
      - created_at
      - kind
      properties:
        name:
          type: string
        created_at:
          type: integer
          format: int64
        kind:
          type: string
          enum:
          - provider_key
          - custom_endpoint
          - custom_secret
          description: |
            Server-derived classification from the stored body's `provider`
            field — the client reads this, it never re-guesses from the name.
            `custom_secret` also covers legacy/corrupt bodies that fail to
            decrypt or parse, so listing always returns 200.
        provider:
          type: string
          nullable: true
          description: Present for `provider_key`/`custom_endpoint` kinds only.
        model:
          type: string
          nullable: true
        base_url:
          type: string
          nullable: true
    ErrorBody:
      type: object
      description: RFC 7807 problem detail error response (application/problem+json)
      required:
      - docs_uri
      - title
      - detail
      - error_code
      - request_id
      properties:
        docs_uri:
          type: string
          format: uri
          description: Stable link to documentation for this error code
          example: https://docs.agentsfleet.net/api-reference/error-codes#UZ-AGT-009
        title:
          type: string
          description: Short human-readable label, same for every occurrence of this code
          example: Fleet not found
        detail:
          type: string
          description: Instance-specific context describing what went wrong
          example: No fleet with id 'abc123' in this workspace.
        error_code:
          type: string
          description: Machine-readable error code
          example: UZ-AGT-009
        request_id:
          type: string
          description: Correlation ID for this request
        current_state:
          type: string
          description: Resource state that blocked the requested change. Present only on 409 responses.
          example: paused
        user_message:
          type: string
          description: |
            Plain message safe to show to a user. Present only when an error defines one.

            Use `detail` or `title` when this field is absent.
          example: We couldn't find that Fleet. It may have been deleted, or the ID doesn't match one in this workspace.
    TenantApiKey:
      type: object
      description: Metadata for a tenant API key. `key_hash` and the raw key are never returned.
      required:
      - id
      - key_name
      - active
      - created_at
      properties:
        id:
          type: string
          format: uuid
        key_name:
          type: string
        active:
          type: boolean
        created_at:
          type: integer
          format: int64
        last_used_at:
          type: integer
          format: int64
          nullable: true
          description: Null until the key is used successfully for API-key authentication.
        revoked_at:
          type: integer
          format: int64
          nullable: true
    FleetKey:
      type: object
      required:
      - fleet_key_id
      - fleet_id
      - name
      - created_at
      properties:
        fleet_key_id:
          type: string
          format: uuid
        fleet_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        created_at:
          type: integer
          format: int64
        last_used_at:
          type: integer
          format: int64
          nullable: true
    IntegrationGrant:
      type: object
      required:
      - grant_id
      - service
      - status
      - requested_at
      properties:
        grant_id:
          type: string
          format: uuid
        service:
          type: string
          enum:
          - slack
          - gmail
          - agentmail
          - discord
          - grafana
        status:
          type: string
          enum:
          - pending
          - approved
          - revoked
        requested_at:
          type: integer
          format: int64
        approved_at:
          type: integer
          format: int64
          nullable: true
        revoked_at:
          type: integer
          format: int64
          nullable: true
        reason:
          type: string
    MemoryEntry:
      type: object
      required:
      - key
      - content
      - category
      - updated_at
      properties:
        key:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 16384
        category:
          type: string
          description: e.g. core, episodic, task
        updated_at:
          type: integer
          format: int64
    PlatformKey:
      type: object
      description: A platform-wide LLM provider key configuration
      properties:
        provider:
          type: string
          description: LLM provider name
        source_workspace_id:
          type: string
          format: uuid
          description: Workspace whose self-managed key is used
        model:
          type: string
          nullable: true
          description: The priced (provider, model_id) this default resolves to. Non-null for the active row; NULL for inactive rows.
        active:
          type: boolean
          description: Whether this platform key is active
        updated_at:
          type: integer
          format: int64
          description: Epoch milliseconds of the last update.
    ReadyzBody:
      type: object
      description: Response body for GET /readyz. Identical shape for both 200 (healthy) and 503 (degraded) responses — only
        the boolean values differ.
      required:
      - ready
      - database
      - queue
      properties:
        ready:
          type: boolean
          description: Overall readiness — true only when every dependency is healthy. Mirrors the HTTP status (true ↔ 200,
            false ↔ 503).
        database:
          type: boolean
          description: True when the database accepts a test query.
        queue:
          type: boolean
          description: True when the event queue is available.
      additionalProperties: false
    FleetSummary:
      type: object
      required:
      - id
      - name
      - status
      - created_at
      - updated_at
      - events_processed
      - budget_used_nanos
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        status:
          type: string
          enum:
          - active
          - paused
          - stopped
          - killed
        created_at:
          type: integer
          format: int64
          description: Unix epoch milliseconds
        updated_at:
          type: integer
          format: int64
        triggers:
          type: array
          nullable: true
          description: Configured fleet triggers. Null when no triggers are set.
          items:
            $ref: '#/components/schemas/FleetTrigger'
        events_processed:
          type: integer
          format: int64
          description: Lifetime count of events processed by this fleet.
        budget_used_nanos:
          type: integer
          format: int64
          description: Total balance used by this fleet, in nanos.
    FleetBundleTemplate:
      type: object
      required:
      - id
      - name
      - description
      - required_credentials
      - required_tools
      - network_hosts
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        required_credentials:
          type: array
          items:
            type: string
        required_credentials_reasons:
          type: object
          additionalProperties:
            type: string
          description: >-
            Per-credential display-only "why this fleet needs it" copy, keyed by
            credential name (e.g. {"github": "review your pull requests"}). An
            install-gate hint, NOT a security control — credential validation
            reads required_credentials. Optional: older catalogs may omit it.
        required_tools:
          type: array
          items:
            type: string
        network_hosts:
          type: array
          items:
            type: string
    FleetBundleSupportFileSummary:
      type: object
      required:
      - path
      - size_bytes
      properties:
        path:
          type: string
        size_bytes:
          type: integer
          format: int64
    FleetBundleRequirements:
      type: object
      required:
      - credentials
      - tools
      - network_hosts
      - support_files
      - trigger_present
      properties:
        credentials:
          type: array
          items:
            type: string
        tools:
          type: array
          items:
            type: string
        network_hosts:
          type: array
          items:
            type: string
        support_files:
          type: array
          items:
            type: string
        trigger_present:
          type: boolean
    FleetLibraryOnboardRequest:
      type: object
      required:
      - source_kind
      properties:
        source_kind:
          type: string
          description: >-
            Where the entry comes from. `github` and `template` are fetched
            and validated server-side; `upload` carries the SKILL.md (and optional
            TRIGGER.md) Markdown inline for a skill-only entry.
          enum:
          - template
          - upload
          - github
        replace:
          type: boolean
          default: false
          description: >-
            Platform tier only. The catalog id comes from the bundle's SKILL.md
            frontmatter name, not this repository path. So a bundle may declare a name
            another repository already owns. That is refused with `UZ-CATALOG-004`,
            rather than silently swapping the bundle every workspace installs. Retry
            with `replace: true` to overwrite it deliberately.
        source_ref:
          type: string
          maxLength: 512
          description: >-
            Required for `github` (an `owner/repo` locator resolved at the default
            branch) and `template` (a first-party template id).
        skill_markdown:
          type: string
          maxLength: 204800
          description: Raw SKILL.md bytes. Required for `upload`; ignored for fetched sources.
        trigger_markdown:
          type: string
          maxLength: 204800
          description: Optional raw TRIGGER.md bytes for `upload`. Ignored for fetched sources.
    FleetLibraryGalleryEntry:
      type: object
      description: >-
        One gallery row — a platform or tenant Fleet library entry. Carries identity,
        description, source, derived requirements, per-credential reason copy, and
        support-file summaries; never an object-store key or support-file content.
      required:
      - id
      - name
      - description
      - visibility
      - source_ref
      - requirements
      - required_credentials_reasons
      - support_files
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          description: >-
            The entry's SKILL.md description, rendered on the gallery card.
            Platform rows carry their curated copy; tenant rows carry the
            description derived from the onboarded SKILL frontmatter.
        visibility:
          type: string
          description: The catalog tier this template belongs to.
          enum:
          - platform
          - tenant
        source_ref:
          type: string
        requirements:
          type: object
          required:
          - credentials
          - tools
          - network_hosts
          - trigger_present
          properties:
            credentials:
              type: array
              items:
                type: string
            tools:
              type: array
              items:
                type: string
            network_hosts:
              type: array
              items:
                type: string
            trigger_present:
              type: boolean
        required_credentials_reasons:
          type: object
          description: >-
            Display-only {credential_name: reason} map driving the install gate's
            purpose copy. Platform rows surface their curated reasons; tenant rows
            surface an empty object (the importer derives no per-credential copy).
          additionalProperties:
            type: string
        support_files:
          type: array
          items:
            $ref: '#/components/schemas/FleetBundleSupportFileSummary'
    FleetLibraryCatalogEntry:
      type: object
      description: >-
        One row of the platform Fleet library catalog, as the operator sees it.
        Metadata only — never bundle markdown, a support-file body, or an
        object-store key.
      required:
      - id
      - name
      - description
      - source_repo
      - source_ref
      - visibility
      - content_hash
      - requirements
      - required_credentials_reasons
      - support_files
      - updated_at
      properties:
        id:
          type: string
          description: The catalog id — the bundle's SKILL.md frontmatter name.
        name:
          type: string
        description:
          type: string
          description: >-
            Operator-owned after the entry is created. Seeded from the bundle on the
            first fetch; a later refetch never overwrites it.
        source_repo:
          type: string
          description: The GitHub repository the bundle was fetched from, as `owner/repo`.
        source_ref:
          type: string
          description: The git ref the bundle was fetched at.
        visibility:
          type: string
          enum: [draft, public]
          description: >-
            The publish lifecycle. `draft` — the bundle is stored and the fleet is
            invisible to every tenant. `public` — live in every workspace gallery and
            installable.
        content_hash:
          type: string
          nullable: true
          description: >-
            The content hash of the stored bundle, or null when no bundle has ever
            been fetched for this entry. A null hash can never be published.
        requirements:
          $ref: '#/components/schemas/FleetBundleRequirements'
        required_credentials_reasons:
          type: object
          additionalProperties:
            type: string
          description: >-
            Per-credential "why this fleet needs it" copy, keyed by credential name,
            shown at the install gate. Operator-owned: the importer cannot derive it,
            and a bundle refetch never overwrites it.
        support_files:
          type: array
          items:
            $ref: '#/components/schemas/FleetBundleSupportFileSummary'
        updated_at:
          type: integer
          format: int64
          description: Milliseconds since the Unix epoch.

    FleetLibraryCatalogPatch:
      type: object
      description: >-
        Partial update of a catalog entry. Every field is optional; an absent field is
        left untouched, so editing the description never blanks the credential copy.
      properties:
        description:
          type: string
        required_credentials_reasons:
          type: object
          additionalProperties:
            type: string
        published:
          type: boolean
          description: >-
            true publishes the entry (requires a bundle); false withdraws it back to
            draft, which removes it from every gallery and blocks new installs.
            Workspaces already running the fleet are unaffected.

    FleetLibraryOnboardResult:
      type: object
      description: >-
        Result of onboarding a Fleet library entry (platform or tenant tier). Carries
        the entry identity, its tier in `visibility`, the content hash, the
        derived requirements, and support-file summaries — never an object-store
        key or support-file content.
      required:
      - id
      - name
      - visibility
      - content_hash
      - requirements
      - support_files
      properties:
        id:
          type: string
          description: Entry id — the slug for platform entries, a UUIDv7 for tenant entries.
        name:
          type: string
        visibility:
          type: string
          description: The catalog tier the entry was onboarded into.
          enum:
          - platform
          - tenant
        content_hash:
          type: string
          description: SHA-256 content hash of the onboarded snapshot.
        requirements:
          $ref: '#/components/schemas/FleetBundleRequirements'
        support_files:
          type: array
          items:
            $ref: '#/components/schemas/FleetBundleSupportFileSummary'
    FleetTrigger:
      type: object
      description: A single trigger projected into the fleet list row.
      oneOf:
      - type: object
        required:
        - type
        - source
        properties:
          type:
            type: string
            enum:
            - webhook
          source:
            type: string
          events:
            type: array
            items:
              type: string
      - type: object
        required:
        - type
        - schedule
        properties:
          type:
            type: string
            enum:
            - cron
          schedule:
            type: string
      - type: object
        required:
        - type
        properties:
          type:
            type: string
            enum:
            - api
    RunnerRegisterRequest:
      type: object
      description: Self-reported runner identity at enrollment. `sandbox_tier` is telemetry only — placement keys off operator-assigned trust, not this claim.
      required:
      - host_id
      - sandbox_tier
      - labels
      properties:
        host_id:
          type: string
          minLength: 1
          maxLength: 256
          description: Operator-supplied host identifier for this runner (1-256 chars).
        sandbox_tier:
          type: string
          description: Isolation strength the runner self-reports. Stored as telemetry.
          enum:
          - landlock_full
          - container_nested
          - macos_seatbelt
          - dev_none
        labels:
          type: array
          description: Free-form operator labels for placement/grouping.
          items:
            type: string
    RunnerRegisterResponse:
      type: object
      description: The durable runner identity plus its bearer token. The `runner_token` is returned exactly once; the server stores only its SHA-256 hash.
      required:
      - runner_id
      - runner_token
      properties:
        runner_id:
          type: string
          format: uuid
          description: The minted runner's id (UUIDv7).
        runner_token:
          type: string
          description: The `agt_r`-prefixed bearer token the runner presents on every later call. Returned once; never retrievable again.
    RunnerSummary:
      type: object
      description: One fleet row as returned to the operator. `liveness` is derived at read time (never stored); the auth `token_hash` and stored auth state are never returned.
      required:
      - id
      - host_id
      - sandbox_tier
      - admin_state
      - liveness
      - labels
      - last_seen_at
      - created_at
      properties:
        id:
          type: string
          format: uuid
        host_id:
          type: string
        sandbox_tier:
          type: string
          enum:
          - landlock_full
          - container_nested
          - macos_seatbelt
          - dev_none
        admin_state:
          type: string
          description: Operator setting. Only `active` accepts runner requests.
          enum:
          - active
          - cordoned
          - draining
          - drained
          - revoked
        liveness:
          type: string
          description: Derived runtime liveness. `registered` = minted, never seen; `busy` = holds a live lease; `online` = heartbeat fresh; `offline` = heartbeat stale.
          enum:
          - registered
          - busy
          - online
          - offline
        labels:
          type: array
          items:
            type: string
        last_seen_at:
          type: integer
          format: int64
          description: Epoch milliseconds of the last heartbeat; 0 if never seen.
        created_at:
          type: integer
          format: int64
          description: Epoch milliseconds the runner was registered.
    RunnerEvent:
      type: object
      description: One append-only runner history row.
      required:
      - id
      - runner_id
      - event_type
      - occurred_at
      - metadata
      properties:
        id:
          type: string
          format: uuid
        runner_id:
          type: string
          format: uuid
        event_type:
          type: string
          enum:
          - runner_registered
          - runner_online
          - runner_offline
          - lease_acquired
          - lease_released
          - runner_cordoned
          - runner_draining
          - runner_drained
          - runner_revoked
        occurred_at:
          type: integer
          format: int64
          description: Epoch milliseconds the event occurred.
        metadata:
          type: object
          description: Event-type-specific metadata (e.g. host_id, from/to admin_state). Shape varies by event_type.
          additionalProperties: true
