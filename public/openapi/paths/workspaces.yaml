/v1/workspaces:
  post:
    operationId: create_workspace
    summary: Create a workspace
    description: Creates a workspace in the caller's tenant. An empty body uses a server-assigned name.
    tags:
    - Workspaces
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Human-readable workspace name. Must be unique within the tenant. If omitted, the
                  server assigns a Heroku-style name (e.g. `jolly-harbor-482`).
    responses:
      '201':
        description: Workspace created
        content:
          application/json:
            schema:
              type: object
              required:
              - workspace_id
              - name
              - request_id
              properties:
                workspace_id:
                  type: string
                  format: uuid
                  description: Unique workspace identifier
                name:
                  type: string
                  description: Human-readable workspace name. Always present — caller-supplied
                    or server-generated Heroku-style.
                request_id:
                  type: string
                  description: Unique request identifier
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/events:
  get:
    operationId: list_workspace_events
    summary: List a workspace's aggregate event history
    description: >
      Cursor-paginated list of operator-visible events across every
      fleet in the workspace, newest first. Replaces the deleted
      activity endpoint. Optional `fleet_id` filter narrows to one
      fleet. Same query shape as the per-fleet endpoint - `actor`
      glob, `since=` (duration or RFC 3339), and a `cursor` mutually
      exclusive with `since`.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: query
      required: false
      description: Drill down to one fleet within the workspace.
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: Opaque cursor from a prior response. Mutually exclusive with `since`.
      schema:
        type: string
    - name: actor
      in: query
      required: false
      description: Glob filter against actor.
      schema:
        type: string
    - name: since
      in: query
      required: false
      description: Lower bound on `created_at`. Go-style duration or RFC 3339 timestamp.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - next_cursor
              properties:
                items:
                  type: array
                  items:
                    type: object
                next_cursor:
                  type: string
                  nullable: true
      default:
        $ref: ../components/responses.yaml#/components/responses/Error

/v1/workspaces/{workspace_id}/events/stream:
  get:
    operationId: stream_workspace_events
    summary: Stream live activity for a whole workspace
    description: |
      Opens ONE Server-Sent Events (SSE) stream carrying live activity for
      every fleet the caller can read in the workspace. It is the Fleets Wall's
      single connection, replacing one stream per tile.

      Each message's `data` is the fleet's activity payload with `fleet_id`
      spliced in as the leading field. The client demultiplexes each frame to
      the right fleet by that tag. Identifiers restart at 0 for each connection,
      and the route ignores `Last-Event-ID`.

      The connection adjusts its fan-in as fleets appear or disappear. A caller
      whose workspace access is revoked stops receiving on the next refresh. At
      capacity the route returns 503 `UZ-API-002` with `Retry-After`. Recover a
      reconnect gap through `GET /v1/workspaces/{workspace_id}/events` before
      reconnecting.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: SSE stream opened.
        content:
          text/event-stream:
            schema:
              type: string
              description: SSE-formatted frames; each `data` carries `fleet_id`.
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security:
    - BearerAuth: []
