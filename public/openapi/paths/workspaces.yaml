/v1/workspaces:
  post:
    operationId: create_workspace
    summary: Create a workspace
    description: Creates a workspace in the caller's tenant. An empty body uses a server-assigned name.
    tags:
    - Workspaces
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Human-readable workspace name. Must be unique within the tenant. If omitted, the
                  server assigns a Heroku-style name (e.g. `jolly-harbor-482`).
    responses:
      '201':
        description: Workspace created
        content:
          application/json:
            schema:
              type: object
              required:
              - workspace_id
              - name
              - request_id
              properties:
                workspace_id:
                  type: string
                  format: uuid
                  description: Unique workspace identifier
                name:
                  type: string
                  description: Human-readable workspace name. Always present — caller-supplied
                    or server-generated Heroku-style.
                request_id:
                  type: string
                  description: Unique request identifier
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/events:
  get:
    operationId: list_workspace_events
    summary: List a workspace's aggregate event history
    description: >
      Cursor-paginated list of operator-visible events across every
      fleet in the workspace, newest first. Replaces the deleted
      activity endpoint. Optional `fleet_id` filter narrows to one
      fleet. Same query shape as the per-fleet endpoint - `actor`
      glob, `since=` (duration or RFC 3339), and a `cursor` mutually
      exclusive with `since`.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: query
      required: false
      description: Drill down to one fleet within the workspace.
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: Opaque cursor from a prior response. Mutually exclusive with `since`.
      schema:
        type: string
    - name: actor
      in: query
      required: false
      description: Glob filter against actor.
      schema:
        type: string
    - name: since
      in: query
      required: false
      description: Lower bound on `created_at`. Go-style duration or RFC 3339 timestamp.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - next_cursor
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/FleetEvent
                next_cursor:
                  type: string
                  nullable: true
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/preferences:
  get:
    operationId: get_workspace_preferences
    summary: Read the caller's dashboard preferences for a workspace
    description: >
      Returns every dashboard preference the calling user has set in this
      workspace, as an object keyed by preference key. A user who has set
      nothing gets `{"prefs": {}}` - never a 404, so a client can tell "no
      preferences" from "preferences unavailable" without branching.
      Preferences are per user AND per workspace: a second workspace starts
      its onboarding checklist fresh.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Workspace identifier (Universally Unique Identifier version 7)
    responses:
      '200':
        description: The caller's preference bag for this workspace
        content:
          application/json:
            schema:
              type: object
              required:
              - prefs
              properties:
                prefs:
                  type: object
                  description: >
                    Preference key to value. Values are client-owned and opaque
                    to the server. Absent keys have never been set.
                  additionalProperties: true
                  x-stability: stable
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/preferences/{pref_key}:
  put:
    operationId: put_workspace_preference
    summary: Write one dashboard preference
    description: >
      Upserts a single preference for the calling user in this workspace and
      returns the full updated bag. The request body IS the value - any
      well-formed JavaScript Object Notation (JSON) value up to 1 KiB, stored
      verbatim and never interpreted by the server. `pref_key` must be one the
      dashboard declares; anything else is refused with `UZ-PREFS-001` and no
      row is written. Concurrent writes to one key are last-write-wins by
      design: a preference is a single toggle, so a lost write costs one click.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Workspace identifier (Universally Unique Identifier version 7)
    - name: pref_key
      in: path
      required: true
      schema:
        type: string
        enum:
        - getting_started_dismissed
        - getting_started_collapsed
        - getting_started_cli_ticked
      description: The preference to write. Must be a key the dashboard declares.
    requestBody:
      required: true
      description: The preference value. Any JSON value up to 1 KiB.
      content:
        application/json:
          schema: {}
    responses:
      '200':
        description: The caller's preference bag, including the written key
        content:
          application/json:
            schema:
              type: object
              required:
              - prefs
              properties:
                prefs:
                  type: object
                  additionalProperties: true
                  x-stability: stable
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/onboarding:
  get:
    operationId: get_workspace_onboarding
    summary: Read the workspace's onboarding checklist state
    description: >
      Returns every signal the Getting Started checklist needs in one call.
      Five signals are derived server-side in a single query. A model is
      configured, a fleet exists, a credential exists, an event has been
      processed, and a steer event exists. Three more are the caller's stored UI
      preferences: dismissed, collapsed, and CLI ticked. This replaces six
      separate requests with one.
    tags:
    - Workspaces
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Workspace identifier (Universally Unique Identifier version 7)
    responses:
      '200':
        description: The onboarding checklist state for the calling user
        content:
          application/json:
            schema:
              type: object
              required:
              - model_configured
              - has_fleet
              - has_secret
              - has_processed_event
              - has_steer_event
              - cli_ticked
              - dismissed
              - collapsed
              properties:
                model_configured: { type: boolean, x-stability: stable }
                has_fleet: { type: boolean, x-stability: stable }
                has_secret: { type: boolean, x-stability: stable }
                has_processed_event: { type: boolean, x-stability: stable }
                has_steer_event: { type: boolean, x-stability: stable }
                cli_ticked: { type: boolean, x-stability: stable }
                dismissed: { type: boolean, x-stability: stable }
                collapsed: { type: boolean, x-stability: stable }
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
