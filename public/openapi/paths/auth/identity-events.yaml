/v1/auth/identity-events/clerk:
  post:
    operationId: auth_identity_event_clerk
    summary: Receive a Clerk account event
    description: |
      Receives signed account events from Clerk. A `user.created` event creates the user's account and default workspace.

      Repeated events return `created:false`. Unsupported event types return 200 with `status: ignored`.
    tags:
    - auth-identity-events
    parameters:
    - name: svix-id
      in: header
      required: true
      description: Svix message identifier (used for deduplication and signature binding).
      schema:
        type: string
    - name: svix-timestamp
      in: header
      required: true
      description: Unix timestamp of the Svix delivery (used for replay protection).
      schema:
        type: string
    - name: svix-signature
      in: header
      required: true
      description: Space-separated list of Svix v1 signatures.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - type
            - data
            properties:
              type:
                type: string
                description: Clerk event type. Only `user.created` triggers a bootstrap; other types return 200 ignored.
              data:
                type: object
                description: |
                  Clerk user payload. The handler reads `id`, `email_addresses`,
                  `primary_email_address_id`, `first_name`, and `last_name`; unknown fields are tolerated.
                additionalProperties: true
    responses:
      '200':
        description: "Handled. Shape depends on event type: user.created → {workspace_id, workspace_name, created}; user.deleted → {deleted}; any other type → {status: ignored, type}."
        content:
          application/json:
            schema:
              type: object
              properties:
                workspace_id:
                  type: string
                  format: uuid
                  description: New or existing default workspace identifier.
                workspace_name:
                  type: string
                  description: Heroku-style workspace name, e.g. `jolly-harbor-482`.
                created:
                  type: boolean
                  description: "`true` on fresh bootstrap; `false` on idempotent replay."
                deleted:
                  type: boolean
                  description: true on a user.deleted event.
                status:
                  type: string
                  description: "`ignored` for event types other than user.created/user.deleted."
                type:
                  type: string
                  description: Echoed Clerk event type on ignored events.
      '400':
        $ref: ../../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../../components/responses.yaml#/components/responses/Error
      '500':
        $ref: ../../components/responses.yaml#/components/responses/Error
    security: []
