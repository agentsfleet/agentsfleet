/healthz:
  get:
    operationId: healthz
    summary: Liveness check
    description: Returns 200 as long as the process is alive and able to serve HTTP. Does not probe dependencies — use /readyz
      for readiness (database + queue).
    tags:
    - Health
    security: []
    responses:
      '200':
        description: Process is alive
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - service
              - commit
              properties:
                status:
                  type: string
                  const: ok
                  description: Always "ok" for a live process
                service:
                  type: string
                  const: agentsfleetd
                  description: Service identifier
                commit:
                  type: string
                  description: Git commit SHA of the running build
/metrics:
  get:
    operationId: metrics
    summary: Prometheus metrics
    description: Returns Prometheus-format metrics for scraping by monitoring infrastructure.
    tags:
    - Health
    security: []
    responses:
      '200':
        description: Prometheus text exposition format
        content:
          text/plain:
            schema:
              type: string
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/readyz:
  get:
    operationId: readyz
    summary: Readiness probe
    description: Returns 200 when the database and event queue are available. Returns 503 when either dependency is unavailable.
    tags:
    - Health
    security: []
    responses:
      '200':
        description: Both dependencies healthy
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ReadyzBody
      '503':
        description: At least one dependency is degraded; ready=false and the failing dependency's boolean is false
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ReadyzBody
