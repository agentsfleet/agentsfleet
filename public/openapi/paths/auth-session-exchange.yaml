/v1/auth/sessions/{session_id}/approve:
  patch:
    operationId: approve_auth_session
    summary: Approve a sign-in session
    description: |
      Approves a pending command-line sign-in session. The dashboard sends encrypted sign-in data and a six-digit verification code.

      A second approval for the same session returns 409 `UZ-AUTH-015`.
    tags:
    - Authentication
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - dashboard_public_key
            - ciphertext
            - nonce
            - verification_code
            properties:
              dashboard_public_key:
                type: string
                description: Temporary public key used to encrypt the sign-in data.
              ciphertext:
                type: string
                description: Encrypted sign-in data.
              nonce:
                type: string
                description: Random 12-byte value used for this encrypted message.
              verification_code:
                type: string
                pattern: '^[0-9]{6}$'
                description: Exactly six digits shown to the user.
    responses:
      '200':
        description: Session is ready for code verification.
        content:
          application/json:
            schema:
              type: object
              required:
              - request_id
              properties:
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        $ref: ../components/responses.yaml#/components/responses/Error
      '410':
        $ref: ../components/responses.yaml#/components/responses/Error
      '429':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error

/v1/auth/sessions/{session_id}/verify:
  post:
    operationId: verify_auth_session
    summary: Verify a sign-in session
    description: |
      Checks the six-digit code and returns encrypted sign-in data. The code can be used once.

      A retry from the same client within 60 seconds returns the same response. Later retries return 410 `UZ-AUTH-012`.

      `UZ-AUTH-011` means the code did not match. The fifth failed attempt ends the session.
      `UZ-AUTH-018` means the code was not six digits. `UZ-AUTH-013` means the session ended.
      `UZ-AUTH-014` means approval is pending. `UZ-AUTH-006` means the session expired after 5 minutes.
    tags:
    - Authentication
    security: []
    parameters:
    - name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - verification_code
            properties:
              verification_code:
                type: string
                pattern: '^[0-9]{6}$'
                description: The 6-digit code the dashboard displayed to the user.
    responses:
      '200':
        description: Verification succeeded. The response contains encrypted sign-in data.
        content:
          application/json:
            schema:
              type: object
              required:
              - dashboard_public_key
              - ciphertext
              - nonce
              properties:
                dashboard_public_key:
                  type: string
                  description: Temporary public key from the approval request.
                ciphertext:
                  type: string
                  description: Encrypted sign-in data.
                nonce:
                  type: string
                  description: Random 12-byte value used for this encrypted message.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '410':
        $ref: ../components/responses.yaml#/components/responses/Error
      '429':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
