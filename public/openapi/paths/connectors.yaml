/v1/workspaces/{workspace_id}/connectors/{provider}/connect:
  post:
    operationId: connector_connect
    summary: Get a provider connection URL
    description: |
      Returns a URL for connecting the workspace to the provider. Open the URL in a browser.

      An unknown provider returns 404 `UZ-CONN-004`. An unavailable provider returns 503 `UZ-CONN-001`.
    tags:
    - Connectors
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier.
      schema:
        type: string
        format: uuid
    - name: provider
      in: path
      required: true
      description: Provider identifier, such as `slack` or `github`.
      schema:
        type: string
    responses:
      '200':
        description: Connection URL created.
        content:
          application/json:
            schema:
              type: object
              required:
              - install_url
              properties:
                install_url:
                  type: string
                  description: URL to open in the user's browser.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/connectors:
  get:
    operationId: connector_catalog
    summary: List connectors for a workspace
    description: |
      Returns the providers available to the workspace. Each item shows whether the provider is ready and connected.

      Requires the `connector:read` scope.
    tags:
    - Connectors
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Available connectors and their current state.
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                - id
                - archetype
                - display_name
                - configured
                - connected
                properties:
                  id:
                    type: string
                    description: Provider identifier.
                  archetype:
                    type: string
                    description: Connection method used by the provider.
                    enum:
                    - oauth2
                    - app_install
                  display_name:
                    type: string
                  configured:
                    type: boolean
                    description: True when the provider is ready to connect.
                  connected:
                    type: boolean
                    description: True when the workspace is connected.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/connectors/{provider}:
  get:
    operationId: connector_status
    summary: Read a connector status
    description: |
      Returns `connected` or `not_connected` for one provider. Requires the `connector:read` scope.

      An unknown provider returns 404 `UZ-CONN-004`.
    tags:
    - Connectors
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: Workspace identifier.
      schema:
        type: string
        format: uuid
    - name: provider
      in: path
      required: true
      description: Provider identifier, such as `slack` or `github`.
      schema:
        type: string
    responses:
      '200':
        description: Connector status.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  enum:
                  - connected
                  - not_connected
                team:
                  type:
                  - string
                  - 'null'
                  description: Connected Slack workspace name. Null for other providers.
                label:
                  type:
                  - string
                  - 'null'
                  description: Provider label when available.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/connectors/{provider}/callback:
  get:
    operationId: connector_callback
    summary: Complete a provider connection
    description: |
      The provider sends the user's browser here after approval. A valid callback connects the workspace and returns the browser to the dashboard.

      Invalid, expired, or reused state returns 400 `UZ-CONN-002`. A provider timeout returns `UZ-CONN-003`.
    tags:
    - Connectors
    parameters:
    - name: provider
      in: path
      required: true
      description: Provider identifier, such as `slack` or `github`.
      schema:
        type: string
    - name: state
      in: query
      required: true
      description: One-time value supplied through the connection URL.
      schema:
        type: string
    - name: code
      in: query
      required: false
      description: Authorization code supplied by the provider when required.
      schema:
        type: string
    - name: installation_id
      in: query
      required: false
      description: Installation identifier supplied by providers such as GitHub.
      schema:
        type: string
    responses:
      '302':
        description: Connected. The browser returns to the dashboard.
        headers:
          Location:
            description: Dashboard connectors page.
            schema:
              type: string
      '200':
        description: Connected without a dashboard redirect.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              properties:
                status:
                  type: string
                  const: connected
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '502':
        $ref: ../components/responses.yaml#/components/responses/Error
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/connectors/slack/events:
  post:
    operationId: slack_events
    summary: Receive Slack events
    description: |
      Slack sends signed events to this route. Users do not call this route.

      An invalid signature returns 401 `UZ-SLK-010`. A timestamp outside 5 minutes returns 401 `UZ-SLK-011`.
    tags:
    - Connectors
    parameters:
    - name: X-Slack-Signature
      in: header
      required: true
      description: Slack request signature. Slack supplies this value.
      schema:
        type: string
    - name: X-Slack-Request-Timestamp
      in: header
      required: true
      description: Delivery time in Unix seconds. Values outside 5 minutes are rejected.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Slack event or URL verification request.
            additionalProperties: true
    responses:
      '200':
        description: Accepted, duplicate, verification, or ignored response.
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                additionalProperties: false
                required:
                - status
                properties:
                  status:
                    type: string
                    enum:
                    - accepted
                    - duplicate
              - type: object
                additionalProperties: false
                required:
                - challenge
                properties:
                  challenge:
                    type: string
                    description: Value returned for Slack URL verification.
              - type: object
                additionalProperties: false
                required:
                - ignored
                properties:
                  ignored:
                    type: string
                    const: UZ-SLK-020
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
