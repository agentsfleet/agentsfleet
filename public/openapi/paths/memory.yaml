/v1/workspaces/{workspace_id}/fleets/{fleet_id}/memories:
  get:
    operationId: list_fleet_memories
    summary: List or search memory entries for a fleet
    description: >
      Returns memory entries for the fleet. Without `query` this lists most-recent
      entries (optionally filtered by `category`). With `query`, performs case-insensitive
      LIKE search across both `key` and `content` (LIKE metacharacters in `query` are
      escaped — a query of `%` does NOT return every entry).
    tags:
    - Memory
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: query
      in: query
      required: false
      description: Fuzzy text search across key and content. When omitted, the endpoint lists most-recent entries.
      schema:
        type: string
    - name: category
      in: query
      required: false
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 100
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/MemoryEntry
                total:
                  type: integer
                request_id:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/fleets/{fleet_id}/memories/{key}:
  delete:
    operationId: delete_fleet_memory
    summary: Forget a fleet memory entry
    description: |
      Deletes one memory entry for this fleet. The key is scoped to the fleet, so a key from another fleet is not deleted.

      Missing keys return 404 so an operator can tell a mistyped key from a successful forget.
    tags:
    - Memory
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    - name: key
      in: path
      required: true
      description: Memory entry key.
      schema:
        type: string
    responses:
      '204':
        description: Memory entry deleted.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        description: No memory entry with that key exists for this fleet.
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
