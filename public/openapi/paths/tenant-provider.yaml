/v1/tenants/me/provider:
  get:
    operationId: get_tenant_provider
    summary: Read tenant model provider settings
    description: >
      Returns the tenant's provider mode, provider name, model, context limit,
      and credential reference. Secret values are never returned.
    tags:
    - Tenant
    responses:
      '200':
        description: Provider config
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantProviderConfig'
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  put:
    operationId: put_tenant_provider
    summary: Set tenant model provider
    description: >
      Sets the provider mode and model. Self-managed mode requires a
      `credential_ref` that names an existing secret.

      If the model entry does not exist, this request creates it.
    tags:
    - Tenant
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - mode
            properties:
              mode:
                type: string
                enum: [platform, self_managed]
              credential_ref:
                type: string
                nullable: true
                description: User-named vault key. Required when mode=self_managed.
              model:
                type: string
                nullable: true
                description: Optional model override. Falls back to the credential's stored model when absent.
    responses:
      '200':
        description: Provider config after upsert
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantProviderConfig'
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_tenant_provider
    summary: Reset tenant LLM provider to platform default
    description: >
      Equivalent to `PUT {mode: "platform"}`. Writes the explicit
      mode=platform row so the dashboard can distinguish "never
      configured" from "explicitly reset".
    tags:
    - Tenant
    responses:
      '200':
        description: Provider config after reset
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantProviderConfig'
      default:
        $ref: ../components/responses.yaml#/components/responses/Error

components:
  schemas:
    TenantProviderConfig:
      type: object
      required:
      - mode
      - provider
      - model
      - context_cap_tokens
      - credential_ref
      properties:
        mode:
          type: string
          enum: [platform, self_managed]
        provider:
          type: string
        model:
          type: string
        context_cap_tokens:
          type: integer
          format: int64
        credential_ref:
          type: string
          nullable: true
