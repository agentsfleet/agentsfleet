/v1/admin/fleet-templates:
  post:
    operationId: onboard_platform_fleet_template
    summary: Onboard a platform Fleet template
    description: >-
      Onboards a Fleet template into the global platform catalog from a GitHub
      source reference. Requires the `platform-template:write` scope. The
      canonical bundle is written to internal object storage keyed by content
      hash; the response carries metadata only — never an object-store key or
      support-file content.
    tags:
    - Fleet Templates
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/components/schemas/FleetTemplateOnboardRequest
    responses:
      '201':
        description: Template onboarded into the platform catalog.
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/FleetTemplateOnboardResult
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      '502':
        $ref: ../components/responses.yaml#/components/responses/Error
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/fleet-templates:
  get:
    operationId: list_workspace_fleet_templates
    summary: List the workspace Fleet template gallery
    description: >-
      Returns the union of the platform Fleet template catalog and this
      workspace's own tenant templates — and nothing from another workspace.
      Each entry carries identity, source, requirements, and support-file
      summaries; never an object-store key.
    tags:
    - Fleet Templates
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: The workspace template gallery.
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/FleetTemplateGalleryEntry
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: onboard_tenant_fleet_template
    summary: Onboard a tenant Fleet template
    description: >-
      Onboards a Fleet template into the caller's workspace catalog from a GitHub
      source reference. Requires the `template:write` scope plus ownership of the
      target workspace. Re-onboarding identical bytes converges on one
      `(workspace_id, content_hash)` row. The response carries metadata only.
    tags:
    - Fleet Templates
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: ../components/schemas.yaml#/components/schemas/FleetTemplateOnboardRequest
    responses:
      '201':
        description: Template onboarded into the workspace catalog.
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/FleetTemplateOnboardResult
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      '502':
        $ref: ../components/responses.yaml#/components/responses/Error
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
