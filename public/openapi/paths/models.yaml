/v1/models:
  get:
    operationId: get_model_library
    summary: List available models
    description: >
      Returns models available to the tenant. Each item includes its provider,
      context limit, and usage fields. An empty library returns an empty array.
    tags:
    - Model Library
    responses:
      '200':
        description: The model library catalogue.
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - models
              properties:
                version:
                  type: string
                  description: Date of the most recently updated model, formatted as YYYY-MM-DD in UTC.
                models:
                  type: array
                  items:
                    type: object
                    required:
                    - id
                    - provider
                    - context_cap_tokens
                    - input_nanos_per_mtok
                    - cached_input_nanos_per_mtok
                    - output_nanos_per_mtok
                    properties:
                      id:
                        type: string
                        description: The model_id. Provider hosting is encoded in the id itself.
                      provider:
                        type: string
                      context_cap_tokens:
                        type: integer
                        format: int32
                      input_nanos_per_mtok:
                        type: integer
                        format: int64
                      cached_input_nanos_per_mtok:
                        type: integer
                        format: int64
                      output_nanos_per_mtok:
                        type: integer
                        format: int64
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
