/v1/fleets/bundles:
  get:
    operationId: list_fleet_bundles
    summary: List the platform Fleet template catalog
    description: Returns the first-party (platform) Fleet template catalog. Rows contain only metadata and requirement hints; they carry no credential values or object-store keys. The workspace gallery union lives at GET /v1/workspaces/{workspace_id}/fleet-templates.
    tags:
    - Fleet Bundles
    responses:
      '200':
        description: Template metadata.
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/FleetBundleTemplate
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
