/v1/workspaces/{workspace_id}/secrets:
  get:
    operationId: list_workspace_secrets
    summary: List secrets stored for a workspace
    description: Returns secret names and non-secret descriptors. Values are never returned — they live encrypted in `vault.secrets`.
    tags:
    - Secrets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                secrets:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/SecretSummary
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: store_workspace_secret
    summary: Store a secret in the workspace vault
    description: |
      Plaintext is the canonical-stringified form of the supplied JSON object,
      envelope-encrypted with the KEK (master key v1) and persisted to
      `vault.secrets`. The raw value is never stored unencrypted and never
      returned. `data` must be a non-empty JSON object whose stringified form
      is ≤ 4 KiB; a stringified form over 4 KiB is rejected with `UZ-VAULT-002`,
      and bare strings, arrays, scalars, and `{}` are rejected with
      `UZ-VAULT-001`.
    tags:
    - Secrets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - name
            - data
            properties:
              name:
                type: string
                maxLength: 64
                description: Secret identifier a Fleet interpolates as `${secrets.<name>.<field>}`.
              data:
                type: object
                minProperties: 1
                additionalProperties: true
                description: |
                  JSON object whose top-level keys are the field names a skill
                  references via `${secrets.<name>.<field>}`. The runtime never
                  inspects the schema — this is opaque to the platform.
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/secrets/{secret_name}:
  patch:
    operationId: rotate_workspace_secret
    summary: Rotate a secret's api_key field
    description: |
      Replaces only the stored `api_key` field; `provider`/`model`/`base_url`
      (and any other stored fields) are preserved by loading the existing
      object and swapping the single field. A missing secret returns
      `UZ-VAULT-003`.
    tags:
    - Secrets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: secret_name
      in: path
      required: true
      description: Secret name.
      schema:
        type: string
        maxLength: 64
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - api_key
            properties:
              api_key:
                type: string
                description: The new key. Rejected empty or over the 4 KiB stored-object limit (`UZ-VAULT-002`), and never echoed back or logged.
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_workspace_secret
    summary: Delete a secret from the workspace vault
    description: |
      Idempotent — returns 204 whether or not the secret existed.
    tags:
    - Secrets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: secret_name
      in: path
      required: true
      description: Secret name.
      schema:
        type: string
        maxLength: 64
    responses:
      '204':
        description: Secret deleted (or already absent)
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
