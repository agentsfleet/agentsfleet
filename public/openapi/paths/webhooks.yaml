/v1/ingress/{provider}:
  post:
    operationId: ingest_connector_webhook
    summary: Receive a platform-managed connector webhook
    description: >-
      Bearer-less ingress for a platform-managed connector App. The provider
      signature is verified against the platform-admin vault before the JSON
      body is parsed. The provider installation maps the delivery to one
      workspace; active fleet subscriptions, repository bindings, event types,
      and approved integration grants determine the fan-out targets. Replay
      identity is derived from the authenticated body, not mutable delivery
      headers. GitHub is the currently supported provider.
    tags:
    - Webhooks
    parameters:
    - name: provider
      in: path
      required: true
      description: Connector provider that signed the delivery.
      schema:
        type: string
        enum:
        - github
    - name: X-GitHub-Event
      in: header
      required: true
      description: GitHub event type, currently `ping`, `pull_request`, or `workflow_run`.
      schema:
        type: string
    - name: X-GitHub-Delivery
      in: header
      required: true
      description: GitHub-issued diagnostic delivery identifier. It is not trusted for replay protection because this header is outside the signed body.
      schema:
        type: string
    - name: X-Hub-Signature-256
      in: header
      required: true
      description: Hash-based Message Authentication Code (HMAC)-SHA256 of the raw body, prefixed with `sha256=`.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Raw provider webhook payload. Routed GitHub events must carry `installation.id` and `repository.full_name`; signed `ping` payloads are acknowledged without those fields.
            additionalProperties: true
    responses:
      '202':
        description: Delivery matched one or more fleets; new per-fleet events were enqueued and replays were suppressed.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - matched
              - enqueued
              properties:
                status:
                  type: string
                  x-stability: stable
                  enum:
                  - accepted
                matched:
                  type: integer
                  x-stability: stable
                  minimum: 1
                  maximum: 100
                enqueued:
                  type: integer
                  x-stability: stable
                  minimum: 0
                  maximum: 100
      '200':
        description: Delivery was a signed ping, or was valid but intentionally ignored because its event was filtered, its installation was unmapped, or no fleet subscription matched.
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                additionalProperties: false
                required:
                - status
                properties:
                  status:
                    type: string
                    x-stability: stable
                    enum:
                    - pong
                    - ignored
              - type: object
                additionalProperties: false
                required:
                - ignored
                properties:
                  ignored:
                    type: string
                    x-stability: stable
                    enum:
                    - UZ-WH-021
                    - UZ-WH-022
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      '429':
        description: This API instance reached its in-flight request ceiling. Retry after the advertised delay.
        headers:
          Retry-After:
            description: Seconds before retrying.
            schema:
              type: integer
              minimum: 0
          X-RateLimit-Limit:
            description: Instance in-flight request ceiling.
            schema:
              type: integer
              minimum: 0
          X-RateLimit-Remaining:
            description: Remaining admission capacity, zero for this response.
            schema:
              type: integer
              enum:
              - 0
          X-RateLimit-Reset:
            description: Unix timestamp in seconds when immediate retry becomes reasonable.
            schema:
              type: integer
              format: int64
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{fleet_id}/github:
  post:
    operationId: github_webhook
    summary: Ingest a GitHub Actions webhook
    description: GitHub `workflow_run` webhook receiver. Body is HMAC-SHA256 signed (X-Hub-Signature-256) against the workspace's
      `fleet:github` credential `webhook_secret` field. Only `action=completed` with `conclusion=failure` is XADDed to the
      fleet event stream; other events return 200. Idempotency keyed on `X-GitHub-Delivery` for 24h.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet that owns this webhook receiver.
      schema:
        type: string
        format: uuid
    - name: X-GitHub-Event
      in: header
      required: true
      description: GitHub event type. Only `workflow_run` is ingested.
      schema:
        type: string
    - name: X-GitHub-Delivery
      in: header
      required: true
      description: GitHub-issued delivery UUID. Used as the dedupe key.
      schema:
        type: string
    - name: X-Hub-Signature-256
      in: header
      required: true
      description: HMAC-SHA256 of the raw body, prefixed with `sha256=`.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Raw GitHub webhook payload — see https://docs.github.com/en/webhooks/webhook-events-and-payloads#workflow_run.
    responses:
      '202':
        description: Event accepted and enqueued.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                event_id:
                  type: string
      '200':
        description: Duplicate delivery (idempotency hit) or event ignored (fleet paused, non-workflow_run, non-completed
          action, or non-failure conclusion). Body distinguishes the two via the `deduped` or `ignored` field. The
          `fleet_paused` ignore does not consume the dedup slot, so redelivery after resume processes normally.
        content:
          application/json:
            schema:
              type: object
              properties:
                deduped:
                  type: boolean
                ignored:
                  type: string
                  description: Reason the event was filtered out (e.g. `non_failure_conclusion`, `fleet_paused`).
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{fleet_id}/approval:
  post:
    operationId: approval_webhook
    summary: Resolve a fleet approval gate
    description: Called by a human (via email link or Slack action) to approve or reject a paused fleet. Body is HMAC-signed
      by the issuer; the signature is verified against the fleet's webhook secret.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - action_id
            - decision
            properties:
              action_id:
                type: string
                description: The approval gate's action_id to resolve.
              decision:
                type: string
                enum:
                - approve
                - deny
    responses:
      '200':
        description: Resolved.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                action_id:
                  type: string
                decision:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{fleet_id}/grant-approval:
  post:
    operationId: grant_approval_webhook
    summary: Approve or reject an integration grant request
    description: Human-in-the-loop approval webhook for integration grant requests (Slack, GitHub, etc.). HMAC-signed.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - grant_id
            - decision
            - nonce
            properties:
              grant_id:
                type: string
              decision:
                type: string
                enum:
                - approved
                - denied
              nonce:
                type: string
                description: Single-use anti-replay nonce issued with the approval request.
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                grant_id:
                  type: string
                decision:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/svix/{fleet_id}:
  post:
    operationId: receive_svix_webhook
    summary: Receive a Svix-signed webhook (Clerk events)
    description: Ingress endpoint for Svix-signed webhooks (e.g. Clerk user lifecycle events). Signature is verified by
      the webhook auth middleware against the workspace's Svix secret before the handler runs. Body shape is
      event-specific and defined by the upstream issuer; the server validates the envelope and dispatches to the fleet's
      event log.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet receiving the webhook.
      schema:
        type: string
        format: uuid
    - name: svix-id
      in: header
      required: true
      description: Svix message identifier (used for deduplication and signature binding).
      schema:
        type: string
    - name: svix-timestamp
      in: header
      required: true
      description: Unix timestamp of the Svix delivery (used for replay protection).
      schema:
        type: string
    - name: svix-signature
      in: header
      required: true
      description: Space-separated list of Svix signatures (v1 scheme).
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Opaque event envelope; upstream issuer (Svix) defines the payload shape per event type.
            additionalProperties: true
    responses:
      '202':
        description: Webhook accepted and queued for processing.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - accepted
      '200':
        description: 'Not enqueued, intentionally. Two shapes: duplicate delivery (`{"status": "duplicate"}` — same body
          `event_id` within the 24-hour dedup window) or event ignored (`{"ignored": "fleet_paused"}` — fleet is paused;
          the dedup slot is not consumed, so redelivery after resume processes normally).'
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  const: duplicate
                ignored:
                  type: string
                  description: Reason the event was ignored (e.g. `fleet_paused`).
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
