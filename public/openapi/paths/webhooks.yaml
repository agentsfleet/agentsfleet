/v1/ingress/{provider}:
  post:
    operationId: ingest_connector_webhook
    summary: Receive a provider event
    description: |
      Receives signed events from a connected provider. GitHub is the supported provider.

      A matching event starts runs for subscribed fleets. Duplicate events do not start another run.
    tags:
    - Webhooks
    parameters:
    - name: provider
      in: path
      required: true
      description: Provider that sent the event.
      schema:
        type: string
        enum:
        - github
    - name: X-GitHub-Event
      in: header
      required: true
      description: GitHub event type, currently `ping`, `pull_request`, or `workflow_run`.
      schema:
        type: string
    - name: X-GitHub-Delivery
      in: header
      required: true
      description: Delivery identifier supplied by GitHub.
      schema:
        type: string
    - name: X-Hub-Signature-256
      in: header
      required: true
      description: Hash-based Message Authentication Code (HMAC)-SHA256 of the raw body, prefixed with `sha256=`.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: A signed GitHub event body. Events other than `ping` require `installation.id` and `repository.full_name`.
            additionalProperties: true
    responses:
      '202':
        description: Event matched at least one fleet.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - matched
              - enqueued
              properties:
                status:
                  type: string
                  x-stability: stable
                  enum:
                  - accepted
                matched:
                  type: integer
                  x-stability: stable
                  minimum: 1
                  maximum: 100
                enqueued:
                  type: integer
                  x-stability: stable
                  minimum: 0
                  maximum: 100
      '200':
        description: Valid event that required no fleet run.
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                additionalProperties: false
                required:
                - status
                properties:
                  status:
                    type: string
                    x-stability: stable
                    enum:
                    - pong
                    - ignored
              - type: object
                additionalProperties: false
                required:
                - ignored
                properties:
                  ignored:
                    type: string
                    x-stability: stable
                    enum:
                    - UZ-WH-021
                    - UZ-WH-022
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      '429':
        description: This API instance reached its in-flight request ceiling. Retry after the advertised delay.
        headers:
          Retry-After:
            description: Seconds before retrying.
            schema:
              type: integer
              minimum: 0
          X-RateLimit-Limit:
            description: Instance in-flight request ceiling.
            schema:
              type: integer
              minimum: 0
          X-RateLimit-Remaining:
            description: Remaining admission capacity, zero for this response.
            schema:
              type: integer
              enum:
              - 0
          X-RateLimit-Reset:
            description: Unix timestamp in seconds when immediate retry becomes reasonable.
            schema:
              type: integer
              format: int64
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{fleet_id}/github:
  post:
    operationId: github_webhook
    summary: Receive a signed GitHub event
    description: |
      Verifies the body with the `webhook_secret` field from the workspace's `github` secret.

      Reviewable `pull_request` events and failed completed `workflow_run` events create fleet events. A delivery identifier remains reserved for 72 hours after acceptance.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet that owns this webhook receiver.
      schema:
        type: string
        format: uuid
    - name: X-GitHub-Event
      in: header
      required: true
      description: GitHub event type.
      schema:
        type: string
        enum:
        - pull_request
        - workflow_run
    - name: X-GitHub-Delivery
      in: header
      required: true
      description: GitHub-issued delivery UUID. Used as the dedupe key.
      schema:
        type: string
    - name: X-Hub-Signature-256
      in: header
      required: true
      description: HMAC-SHA256 of the raw body, prefixed with `sha256=`.
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Raw GitHub webhook payload.
            additionalProperties: true
    responses:
      '202':
        description: Event accepted and enqueued.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - status
              - event_id
              properties:
                status:
                  type: string
                  const: accepted
                event_id:
                  type: string
      '200':
        description: Duplicate or ignored event. An ignored event does not reserve its delivery identifier.
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                additionalProperties: false
                required:
                - deduped
                properties:
                  deduped:
                    type: boolean
                    const: true
              - type: object
                additionalProperties: false
                required:
                - ignored
                properties:
                  ignored:
                    type: string
                    description: Reason the event was ignored.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '413':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{fleet_id}/approval:
  post:
    operationId: approval_webhook
    summary: Resolve a fleet approval gate
    description: Called by a human (via email link or Slack action) to approve or reject a paused fleet. Body is HMAC-signed
      by the issuer; the signature is verified against the fleet's webhook secret.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - action_id
            - decision
            properties:
              action_id:
                type: string
                description: The approval gate's action_id to resolve.
              decision:
                type: string
                enum:
                - approve
                - deny
    responses:
      '200':
        description: Resolved.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                action_id:
                  type: string
                decision:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/{fleet_id}/grant-approval:
  post:
    operationId: grant_approval_webhook
    summary: Approve or reject an integration grant request
    description: Human-in-the-loop approval webhook for integration grant requests (Slack, GitHub, etc.). HMAC-signed.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - grant_id
            - decision
            - nonce
            properties:
              grant_id:
                type: string
              decision:
                type: string
                enum:
                - approved
                - denied
              nonce:
                type: string
                description: Single-use anti-replay nonce issued with the approval request.
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                grant_id:
                  type: string
                decision:
                  type: string
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/webhooks/svix/{fleet_id}:
  post:
    operationId: receive_svix_webhook
    summary: Receive a signed Svix event
    description: |
      Receives a signed Svix event for one fleet. A valid new event returns 202.

      A duplicate or an event for a paused fleet returns 200.
    tags:
    - Webhooks
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet receiving the webhook.
      schema:
        type: string
        format: uuid
    - name: svix-id
      in: header
      required: true
      description: Svix message identifier (used for deduplication and signature binding).
      schema:
        type: string
    - name: svix-timestamp
      in: header
      required: true
      description: Unix timestamp of the Svix delivery (used for replay protection).
      schema:
        type: string
    - name: svix-signature
      in: header
      required: true
      description: Space-separated list of Svix signatures (v1 scheme).
      schema:
        type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            description: Opaque event envelope; upstream issuer (Svix) defines the payload shape per event type.
            additionalProperties: true
    responses:
      '202':
        description: Webhook accepted and queued for processing.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - accepted
      '200':
        description: Duplicate event or event ignored because the fleet is paused.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  const: duplicate
                ignored:
                  type: string
                  description: Reason the event was ignored (e.g. `fleet_paused`).
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
