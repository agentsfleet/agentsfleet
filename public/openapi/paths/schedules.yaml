/v1/ingress/qstash/schedules:
  post:
    operationId: ingest_qstash_schedule
    summary: Receive a scheduled fire
    description: |
      Receives a signed fire from Upstash QStash and appends a `cron` event to the target Fleet.

      A valid duplicate, missing, inactive, or stale fire is accepted without appending an event.
    tags:
    - Schedules
    parameters:
    - name: Upstash-Signature
      in: header
      required: true
      description: QStash signature over the exact request body and destination URL.
      schema:
        type: string
    - name: Upstash-Schedule-Id
      in: header
      required: true
      description: Schedule identifier supplied by QStash.
      schema:
        type: string
        format: uuid
    - name: Upstash-Message-Id
      in: header
      required: true
      description: QStash delivery identifier used for replay suppression.
      schema:
        type: string
        minLength: 1
        maxLength: 256
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
            - schedule_id
            - generation
            properties:
              schedule_id:
                type: string
                format: uuid
              generation:
                type: integer
                format: int64
                minimum: 1
    responses:
      '200':
        description: Signed fire accepted. The fire may have been appended, deduplicated, or ignored as stale or inactive.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - accepted
              properties:
                accepted:
                  type: boolean
                  const: true
                  x-stability: stable
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '429':
        description: This API instance reached its in-flight request ceiling. Retry after the advertised delay.
        headers:
          Retry-After:
            description: Seconds before retrying.
            schema:
              type: integer
              minimum: 0
          X-RateLimit-Limit:
            description: Instance in-flight request ceiling.
            schema:
              type: integer
              minimum: 0
          X-RateLimit-Remaining:
            description: Remaining admission capacity, zero for this response.
            schema:
              type: integer
              enum:
              - 0
          X-RateLimit-Reset:
            description: Unix timestamp in seconds when immediate retry becomes reasonable.
            schema:
              type: integer
              format: int64
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
