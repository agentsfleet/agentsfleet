/v1/webhooks/{fleet_id}:
  post:
    operationId: receive_webhook
    summary: Send a signed event to a fleet
    description: |
      Sends a signed event to one fleet. Every request requires a valid provider signature.

      A new event returns 202. A duplicate within 24 hours returns `status: duplicate`.

      A paused fleet returns `ignored: fleet_paused`. Send the event again after resuming the fleet.
    tags:
    - Fleets
    parameters:
    - name: fleet_id
      in: path
      required: true
      description: Fleet identifier returned by fleet creation or `agentsfleet install --library <LIBRARY_ID>`.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - event_id
            - type
            - data
            properties:
              event_id:
                type: string
                description: Unique event identifier. Duplicates within 24 hours are ignored.
              type:
                type: string
                description: Event type label (e.g. `email.received`, `push`, `payment.succeeded`).
              data:
                type: object
                additionalProperties: true
                description: Event payload — any JSON object. Passed as-is into the fleet event loop.
    responses:
      '202':
        description: Event accepted.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - event_id
              properties:
                status:
                  type: string
                  const: accepted
                event_id:
                  type: string
      '200':
        description: Duplicate event or event ignored because the fleet is paused.
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  const: duplicate
                ignored:
                  type: string
                  description: Reason the event was ignored (e.g. `fleet_paused`).
      '400':
        description: Malformed payload — missing `event_id` or `type`.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '401':
        description: |
          Missing connector settings return `UZ-WH-020`. An invalid signature returns `UZ-WH-010`.

          A Slack timestamp outside 5 minutes returns `UZ-WH-011`.
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      '404':
        description: No active fleet is configured for this source (UZ-WH-001).
        content:
          application/problem+json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/ErrorBody
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security: []
/v1/workspaces/{workspace_id}/fleets:
  get:
    operationId: list_fleets
    summary: List fleets in a workspace
    description: >
      Returns visible fleets with the newest fleet first. Omit `cursor` for the
      first page. Use the returned cursor to read the next page.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: >
        Opaque page cursor from a prior response's `cursor` field, formatted
        `{created_at_epoch_ms}:{fleet_id}`. Omit for the first page.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      description: Page size. Defaults to 20. Clamped to a maximum of 100.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - total
              - cursor
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/FleetSummary
                total:
                  type: integer
                  description: Count of items in this response (not total across pages).
                cursor:
                  type: string
                  nullable: true
                  description: >
                    Opaque cursor to fetch the next page. `null` when there are
                    no more pages.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: create_fleet
    summary: Create a fleet
    description: |
      Creates a fleet from one library entry. Use either `platform_library_id` or `tenant_library_id`.

      The service creates a default API trigger when the library has no trigger.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      description: >-
        Choose one library entry. Use `platform_library_id` for the shared
        library or `tenant_library_id` for the workspace library.
      content:
        application/json:
          schema:
            type: object
            oneOf:
            - required:
              - platform_library_id
            - required:
              - tenant_library_id
            properties:
              platform_library_id:
                type: string
                description: Slug id of a platform catalog library entry to install.
              tenant_library_id:
                type: string
                format: uuid
                description: UUIDv7 of one of this workspace's tenant library entries to install.
              name:
                type: string
                maxLength: 64
                description: Optional operator-supplied fleet name (slug-safe, lowercase/digits/hyphen,
                  max 64 chars). Overrides the SKILL.md-derived name so one library entry can back multiple
                  fleets in a workspace, each with its own name + webhooks. Absent ⇒ the SKILL.md `name:`.
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              type: object
              required:
              - fleet_id
              - name
              - status
              properties:
                fleet_id:
                  type: string
                  format: uuid
                name:
                  type: string
                  description: Fleet name parsed from TRIGGER.md frontmatter or the generated default trigger —
                    the canonical identifier the user will see in `agentsfleet status` and CLI output.
                status:
                  type: string
                  const: installing
                webhook_urls:
                  type: object
                  additionalProperties:
                    type: string
                  description: "Map of each webhook trigger's source → its delivery URL (`{api_url}/v1/webhooks/{fleet_id}/{source}`). Empty object when the fleet declares no webhook triggers."
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        $ref: ../components/responses.yaml#/components/responses/Error
      '424':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/fleets/{fleet_id}:
  get:
    operationId: get_fleet
    summary: Get a fleet
    description: |
      Returns one fleet's editable source, trigger markdown, bundle pin, trigger list, status, and lifetime counters.

      The response carries an `ETag` header over `source_markdown` and `trigger_markdown`. Send that value as `If-Match` when saving source changes to avoid overwriting another operator's edit.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: Fleet detail.
        headers:
          ETag:
            description: Version of the editable source fields.
            schema:
              type: string
        content:
          application/json:
            schema:
              $ref: ../components/schemas.yaml#/components/schemas/FleetDetail
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        description: No fleet with that id exists in this workspace. Cross-workspace reads also return 404.
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  patch:
    operationId: patch_fleet
    summary: Update a fleet
    description: |
      Updates fleet files or status. Every request field is optional.

      `config_json` and `trigger_markdown` cannot be used together. A killed fleet cannot be changed.

      Source editors can send `If-Match` with the `ETag` from GET. A stale tag returns 412 with the current tag in the problem body; omitting the header preserves last-write-wins behavior.

      Status changes require an operator role. Config changes require workspace membership.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    - name: If-Match
      in: header
      required: false
      description: Optional source-version tag from GET. Stale values return 412 with the current `etag`.
      schema:
        type: string
    requestBody:
      required: false
      content:
        application/json:
          schema:
            type: object
            properties:
              config_json:
                type: string
                description: |
                  Replaces the fleet config with a JSON string.
                  Mutually exclusive with `trigger_markdown`.
              trigger_markdown:
                type: string
                description: |
                  Replaces `TRIGGER.md` and updates the fleet name and triggers.
                  Must be non-empty. Mutually exclusive with `config_json`.
              source_markdown:
                type: string
                description: |
                  Replaces `SKILL.md` and its settings. Must be non-empty.
                  The skill name must match the current fleet name.
              status:
                type: string
                enum:
                - active
                - stopped
                - killed
                description: |
                  New fleet state. `active` resumes, and `stopped` can resume later.
                  `killed` is final. Only the service can set `paused`.
    responses:
      '200':
        description: OK
        headers:
          ETag:
            description: Fresh version of the editable source fields after the update.
            schema:
              type: string
        content:
          application/json:
            schema:
              type: object
              properties:
                fleet_id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum:
                  - active
                  - stopped
                  - killed
                  description: 'Present only when the request body included a `status` field. Echoes the new status.'
                config_revision:
                  type: integer
                  format: int64
                etag:
                  type: string
                  description: Fresh version of the editable source fields after the update.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        $ref: ../components/responses.yaml#/components/responses/Error
      '412':
        description: The `If-Match` value is stale. The problem body carries the current `etag`.
        $ref: ../components/responses.yaml#/components/responses/Error
      '503':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_fleet
    summary: Permanently delete a fleet
    description: |
      Permanently deletes the fleet, events, runs, approvals, grants, keys, and memory. This cannot be undone.

      Set the fleet status to `killed` first. Otherwise the request returns 409.

      Requires an operator role.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    responses:
      '204':
        description: Fleet and history deleted.
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/fleets/{fleet_id}/messages:
  post:
    operationId: post_fleet_message
    summary: Post a chat message to a fleet
    description: Starts a fleet run with a chat event. Returns an event identifier for tracking in the activity stream.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      description: UUIDv7 of the workspace.
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      description: UUIDv7 of the fleet.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
            - message
            properties:
              message:
                type: string
                description: Operator message body. Up to 8192 bytes. The server wraps it in a JSON object with a "message"
                  field as the envelope's request payload.
    responses:
      '202':
        description: Event enqueued. The CLI uses event_id to filter SSE frames.
        content:
          application/json:
            schema:
              type: object
              required:
              - status
              - event_id
              properties:
                status:
                  type: string
                  enum:
                  - accepted
                event_id:
                  type: string
                  description: Accepted event identifier. Format `<MILLISECONDS>-<SEQUENCE>`.
      '400':
        $ref: ../components/responses.yaml#/components/responses/Error
      '401':
        $ref: ../components/responses.yaml#/components/responses/Error
      '403':
        $ref: ../components/responses.yaml#/components/responses/Error
      '404':
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        description: Fleet is not active (`UZ-AGT-012`). Resume with `agentsfleet resume <FLEET>`, then retry.
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/fleets/{fleet_id}/events:
  get:
    operationId: list_fleet_events
    summary: List a fleet's event history
    description: >
      Returns fleet events with the newest event first. Filter with `actor` or
      `since`. You cannot use `since` and `cursor` together.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: cursor
      in: query
      required: false
      description: Opaque base64url-no-pad cursor returned in `next_cursor`. Mutually exclusive with `since`.
      schema:
        type: string
    - name: actor
      in: query
      required: false
      description: Glob filter against the row's actor. `*` is a wildcard. Examples - 'steer:kishore', 'webhook:github', 'webhook:*'.
      schema:
        type: string
    - name: since
      in: query
      required: false
      description: Lower bound on `created_at`. Accepts Go-style durations (15s/30m/2h/7d) or RFC 3339 timestamps. Mutually exclusive with `cursor`.
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - next_cursor
              properties:
                items:
                  type: array
                  items:
                    $ref: ../components/schemas.yaml#/components/schemas/FleetEvent
                next_cursor:
                  type: string
                  nullable: true
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/workspaces/{workspace_id}/fleets/{fleet_id}/events/stream:
  get:
    operationId: stream_fleet_events
    summary: Stream live fleet activity
    description: |
      Opens a Server-Sent Events (SSE) stream for new fleet activity. Each message includes `id`, `event`, and `data`.

      Identifiers restart at 0 for each connection. The route ignores `Last-Event-ID`.

      At capacity, the route returns 503 `UZ-API-002` with `Retry-After`. Read missed events before reconnecting.
    tags:
    - Fleets
    parameters:
    - name: workspace_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: fleet_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    responses:
      '200':
        description: SSE stream opened.
        content:
          text/event-stream:
            schema:
              type: string
              description: SSE-formatted frames.
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
    security:
    - BearerAuth: []
