/v1/admin/models:
  get:
    operationId: list_admin_models
    summary: List the priced model catalogue
    description: >
      Every catalogue row in `core.model_library`, ordered by (provider,
      model_id). This is the billing spine — a model absent from the catalogue
      meters at the run fee only. Requires the `model:read` scope.
    tags:
    - Admin
    responses:
      '200':
        description: Catalogue rows
        content:
          application/json:
            schema:
              type: object
              required:
              - models
              - request_id
              properties:
                models:
                  type: array
                  items:
                    $ref: '#/components/schemas/AdminModel'
                request_id:
                  type: string
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  post:
    operationId: create_admin_model
    summary: Add a priced model to the catalogue
    description: >
      Creates one catalogue row. `(provider, model_id)` is the row's immutable
      identity — change either by deleting and re-adding. The rate cache is
      repopulated on success, so a new price is live with no restart. Requires
      the `model:admin` scope.
    tags:
    - Admin
    requestBody:
      required: true
      content:
        application/json:
          schema:
            allOf:
            - type: object
              required:
              - provider
              - model_id
              properties:
                provider:
                  type: string
                  minLength: 1
                  maxLength: 64
                  description: LLM provider name (e.g. openai, anthropic).
                model_id:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: Provider-namespaced model string. May contain `/`.
            - $ref: '#/components/schemas/AdminModelRates'
    responses:
      '201':
        description: Catalogue row created
        content:
          application/json:
            schema:
              allOf:
              - $ref: '#/components/schemas/AdminModel'
              - type: object
                required:
                - request_id
                properties:
                  request_id:
                    type: string
      '409':
        description: A catalogue row for this provider and model already exists (`UZ-PROVIDER-008`).
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/admin/models/{uid}:
  patch:
    operationId: update_admin_model
    summary: Update a catalogue row's caps and rates
    description: >
      Rates-only change; `provider` and `model_id` are the row identity and are
      immutable on this endpoint. The rate cache is repopulated on success.
      Requires the `model:admin` scope.
    tags:
    - Admin
    parameters:
    - name: uid
      in: path
      required: true
      description: UUIDv7 of the catalogue row.
      schema:
        type: string
        format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdminModelRates'
    responses:
      '200':
        description: Row updated
        content:
          application/json:
            schema:
              type: object
              required:
              - uid
              - updated
              - request_id
              properties:
                uid:
                  type: string
                  format: uuid
                updated:
                  type: boolean
                  const: true
                request_id:
                  type: string
      '404':
        description: No catalogue model matches this uid (`UZ-PROVIDER-006`).
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
  delete:
    operationId: delete_admin_model
    summary: Remove a catalogue row
    description: >
      Refuses to delete the model the active platform default points at —
      otherwise the next platform-mode lease resolves a model with no priced
      row and silently meters at the run fee only. Repoint the default first.
      Requires the `model:admin` scope.
    tags:
    - Admin
    parameters:
    - name: uid
      in: path
      required: true
      description: UUIDv7 of the catalogue row.
      schema:
        type: string
        format: uuid
    responses:
      '204':
        description: No Content
      '404':
        description: No catalogue model matches this uid (`UZ-PROVIDER-006`).
        $ref: ../components/responses.yaml#/components/responses/Error
      '409':
        description: This model is the active platform default; repoint the default before deleting it (`UZ-PROVIDER-007`).
        $ref: ../components/responses.yaml#/components/responses/Error
      default:
        $ref: ../components/responses.yaml#/components/responses/Error

components:
  schemas:
    AdminModelRates:
      type: object
      required:
      - context_cap_tokens
      - input_nanos_per_mtok
      - cached_input_nanos_per_mtok
      - output_nanos_per_mtok
      properties:
        context_cap_tokens:
          type: integer
          format: int32
          exclusiveMinimum: 0
          description: Hard input-token cap for the model. Must be > 0.
        input_nanos_per_mtok:
          type: integer
          format: int64
          minimum: 0
          description: Input-token price in nanos per 1M tokens.
        cached_input_nanos_per_mtok:
          type: integer
          format: int64
          minimum: 0
          description: Cached-input-token price in nanos per 1M tokens.
        output_nanos_per_mtok:
          type: integer
          format: int64
          minimum: 0
          description: Output-token price in nanos per 1M tokens.
    AdminModel:
      allOf:
      - type: object
        required:
        - uid
        - provider
        - model_id
        properties:
          uid:
            type: string
            format: uuid
            description: UUIDv7 row key. Used in the URL because `model_id` may contain `/`.
          provider:
            type: string
          model_id:
            type: string
      - $ref: '#/components/schemas/AdminModelRates'
