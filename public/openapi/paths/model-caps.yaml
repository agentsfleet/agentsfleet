/_um/da5b6b3810543fe108d816ee972e4ff8/cap.json:
  get:
    operationId: get_model_caps
    summary: Get the model capability catalogue
    description: |
      Public, unauthenticated model->capability catalogue plus the global, non-secret
      client config (run/event rates, starter credit, free-trial window). Both the
      install skill and `agentsfleet provider set` call this once at provisioning time
      and pin the result.

      The path-key segment (`da5b6b3810543fe108d816ee972e4ff8`) is an opportunistic-crawler
      deflector, not a credential — the catalogue is public information. Rotation is a
      coordinated CLI + skill + API release.
    tags:
    - Model Catalogue
    security: []
    parameters:
    - name: model
      in: query
      required: false
      description: Filter the catalogue to a single `model_id`. Omit to return the whole catalogue.
      schema:
        type: string
    responses:
      '200':
        description: The model catalogue, per-token rates, and global billing config.
        content:
          application/json:
            schema:
              type: object
              required:
              - version
              - models
              - rates
              - billing
              properties:
                version:
                  type: string
                  description: Catalogue version, derived as the max model updated_at rendered YYYY-MM-DD (UTC).
                models:
                  type: array
                  items:
                    type: object
                    required:
                    - id
                    - provider
                    - context_cap_tokens
                    - input_nanos_per_mtok
                    - cached_input_nanos_per_mtok
                    - output_nanos_per_mtok
                    properties:
                      id:
                        type: string
                        description: The model_id. Provider hosting is encoded in the id itself.
                      provider:
                        type: string
                      context_cap_tokens:
                        type: integer
                        format: int32
                      input_nanos_per_mtok:
                        type: integer
                        format: int64
                      cached_input_nanos_per_mtok:
                        type: integer
                        format: int64
                      output_nanos_per_mtok:
                        type: integer
                        format: int64
                rates:
                  type: object
                  required:
                  - run_nanos_per_sec
                  - event_nanos
                  properties:
                    run_nanos_per_sec:
                      type: integer
                      format: int64
                    event_nanos:
                      type: integer
                      format: int64
                billing:
                  type: object
                  required:
                  - starter_credit_nanos
                  - free_trial_end_ms
                  - free_trial_stage_nanos
                  properties:
                    starter_credit_nanos:
                      type: integer
                      format: int64
                    free_trial_end_ms:
                      type: integer
                      format: int64
                    free_trial_stage_nanos:
                      type: integer
                      format: int64
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
