/v1/tenants/me/billing:
  get:
    operationId: get_tenant_billing
    summary: Read the tenant balance
    description: >
      Returns the balance shared by every workspace in the tenant. The response
      also shows whether the balance is empty and whether a free trial is active.
    tags:
    - Billing
    responses:
      '200':
        description: Current tenant balance
        content:
          application/json:
            schema:
              type: object
              required:
              - balance_nanos
              - updated_at
              - is_exhausted
              - exhausted_at
              - free_trial
              properties:
                balance_nanos:
                  type: integer
                  format: int64
                  description: Remaining tenant balance in nanos.
                updated_at:
                  type: integer
                  format: int64
                  description: Last update time in Unix milliseconds.
                is_exhausted:
                  type: boolean
                  description: True after a charge reduces the balance to zero.
                exhausted_at:
                  type: integer
                  format: int64
                  nullable: true
                  description: Time of the first zero balance in Unix milliseconds. Null until then.
                free_trial:
                  type: object
                  description: Current free-trial state.
                  required:
                  - active
                  - ends_at_ms
                  properties:
                    active:
                      type: boolean
                      description: True while the free trial is active.
                    ends_at_ms:
                      type: integer
                      format: int64
                      description: Free-trial end time in Unix milliseconds.
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/tenants/me/billing/charges:
  get:
    operationId: get_tenant_billing_charges
    summary: List tenant charges
    description: >
      Returns charge records with the newest record first. Use `limit` and
      `cursor` to read more records.
    tags:
    - Billing
    parameters:
    - name: limit
      in: query
      description: Number of records to return. The default is 50. Valid values are 1 through 200.
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 200
        default: 50
    - name: cursor
      in: query
      description: Token from `next_cursor` in the previous response. Omit it for the first page.
      required: false
      schema:
        type: string
    responses:
      '200':
        description: Tenant charge records with the newest record first.
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              - next_cursor
              properties:
                next_cursor:
                  type: string
                  nullable: true
                  description: Token for the next page. Null when no records remain.
                items:
                  type: array
                  items:
                    type: object
                    required:
                    - id
                    - tenant_id
                    - workspace_id
                    - fleet_id
                    - event_id
                    - charge_type
                    - posture
                    - model
                    - credit_deducted_nanos
                    - recorded_at
                    properties:
                      id:                    { type: string }
                      tenant_id:             { type: string }
                      workspace_id:          { type: string }
                      fleet_id:             { type: string }
                      event_id:              { type: string }
                      charge_type:           { type: string, enum: [receive, stage] }
                      posture:               { type: string, enum: [platform, self_managed] }
                      model:                 { type: string }
                      credit_deducted_nanos: { type: integer, format: int64 }
                      token_count_input:     { type: integer, format: int64, nullable: true }
                      token_count_output:    { type: integer, format: int64, nullable: true }
                      wall_ms:               { type: integer, format: int64, nullable: true }
                      recorded_at:           { type: integer, format: int64 }
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
/v1/tenants/me/billing/charges/{event_id}/telemetry:
  get:
    operationId: get_tenant_metering_periods
    summary: List details for one charge
    description: >
      Returns the detail records for one charge, oldest first. An unknown
      `event_id` returns an empty `items` list.
    tags:
    - Billing
    parameters:
    - name: event_id
      in: path
      description: Event identifier from a `get_tenant_billing_charges` response.
      required: true
      schema:
        type: string
    responses:
      '200':
        description: Charge details for the requested event.
        content:
          application/json:
            schema:
              type: object
              required:
              - items
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required:
                    - slice_seq
                    - d_input_tokens
                    - d_cached_tokens
                    - d_output_tokens
                    - run_ms
                    - run_fee_nanos
                    - token_cost_nanos
                    - charged_nanos
                    - created_at
                    properties:
                      slice_seq:        { type: integer, format: int64 }
                      d_input_tokens:   { type: integer, format: int64 }
                      d_cached_tokens:  { type: integer, format: int64 }
                      d_output_tokens:  { type: integer, format: int64 }
                      run_ms:           { type: integer, format: int64 }
                      run_fee_nanos:    { type: integer, format: int64 }
                      token_cost_nanos: { type: integer, format: int64 }
                      charged_nanos:    { type: integer, format: int64 }
                      created_at:       { type: integer, format: int64 }
      default:
        $ref: ../components/responses.yaml#/components/responses/Error
